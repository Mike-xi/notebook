<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f7">
  <title>潮汐 · NewsNow 热点雷达</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #f7f7f7; color: #242424; }
    body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
    .coursebar {
      position: fixed; z-index: 5; inset: 0 0 auto; height: calc(48px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
      padding: env(safe-area-inset-top) 12px 0;
      border-bottom: 1px solid #e6e6e6; background: rgba(250,250,250,.92);
      backdrop-filter: blur(18px) saturate(1.4);
    }
    .back, .open {
      display: inline-flex; height: 32px; align-items: center; justify-content: center; gap: 6px;
      padding: 0 10px; border: 1px solid #dedede; border-radius: 8px; background: #fff; color: #555;
      text-decoration: none; white-space: nowrap;
    }
    .back { width: 34px; padding: 0; font-size: 18px; }
    .back:hover, .open:hover { border-color: #bbb; color: #111; }
    .identity { min-width: 0; display: flex; flex: 1; align-items: baseline; gap: 9px; }
    .identity strong { overflow: hidden; font-size: 14px; text-overflow: ellipsis; white-space: nowrap; }
    .identity span { color: #999; font-size: 11px; white-space: nowrap; }
    .status { display: flex; align-items: center; gap: 6px; color: #777; font-size: 11px; }
    .status i { width: 7px; height: 7px; border-radius: 50%; background: #d3a546; box-shadow: 0 0 0 3px #d3a54622; }
    .status.ready i { background: #4da876; box-shadow: 0 0 0 3px #4da87622; }
    .fallback {
      position: fixed; inset: 48px 0 0; display: grid; place-items: center; padding: 24px;
      color: #888; text-align: center;
    }
    .fallback div { max-width: 420px; }
    .fallback strong { display: block; margin-bottom: 7px; color: #333; font-size: 17px; }
    iframe {
      position: fixed; z-index: 2; inset: calc(48px + env(safe-area-inset-top)) 0 0;
      width: 100%; height: calc(100% - 48px - env(safe-area-inset-top)); border: 0; background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #111; color: #ddd; }
      .coursebar { border-color: #292929; background: rgba(20,20,20,.92); }
      .back, .open { border-color: #333; background: #1d1d1d; color: #bbb; }
      .fallback strong { color: #eee; }
      iframe { background: #111; }
    }
    @media (max-width: 620px) {
      .coursebar { height: calc(44px + env(safe-area-inset-top)); padding-right: 8px; padding-left: 8px; }
      .identity span, .status { display: none; }
      .open { width: 34px; padding: 0; font-size: 0; }
      .open::before { content: "↗"; font-size: 17px; }
      iframe { top: calc(44px + env(safe-area-inset-top)); bottom: 0; height: calc(100% - 44px - env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
  <header class="coursebar">
    <a class="back" href="/index.html" aria-label="返回课程">←</a>
    <div class="identity">
      <strong>潮汐 · 热点雷达</strong>
      <span>NewsNow v0.0.41 · 多源实时资讯</span>
    </div>
    <span class="status" id="status"><i></i><span>正在连接</span></span>
    <a class="open" href="https://xi-newsnow.pages.dev/" target="_blank" rel="noopener">独立打开 ↗</a>
  </header>
  <div class="fallback">
    <div>
      <strong>正在启动 NewsNow</strong>
      <span>首次打开会加载资讯源与离线缓存。若当前浏览器阻止嵌入，请使用右上角“独立打开”。</span>
    </div>
  </div>
  <iframe id="news-frame"
          src="https://xi-newsnow.pages.dev/"
          title="NewsNow 实时资讯"
          loading="eager"
          allow="clipboard-read; clipboard-write"
          referrerpolicy="strict-origin-when-cross-origin"></iframe>
  <script>
    const frame = document.getElementById('news-frame');
    const status = document.getElementById('status');
    const ready = () => {
      status.classList.add('ready');
      status.querySelector('span').textContent = '已连接';
    };
    frame.addEventListener('load', ready, { once: true });
    setTimeout(() => {
      if (!status.classList.contains('ready')) status.querySelector('span').textContent = '连接较慢';
    }, 8000);
  </script>
</body>
</html>
