<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复习笔记</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="home">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">📓</span>
      <span class="brand-name">复习笔记</span>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="search" placeholder="搜索课程、学科…" autocomplete="off">
      </div>
      <button class="ghost-btn" id="logout-btn" title="退出登录">退出</button>
    </div>
  </header>

  <main>
    <section id="recent-section" hidden>
      <h2 class="section-title">最近阅读</h2>
      <div id="recent" class="card-grid"></div>
    </section>

    <section>
      <h2 class="section-title">我的笔记</h2>
      <div id="courses" class="card-grid"></div>
      <p id="empty-hint" class="empty-state" hidden>还没有课程笔记</p>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
