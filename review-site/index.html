<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复习笔记</title>
  <script>
    // 首屏前定主题，避免浅/深闪烁；完整逻辑在 theme.js
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="stylesheet" href="/assets/style.css?v=20260607b">
</head>
<body class="home">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">📓</span>
      <span class="brand-name">复习笔记</span>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="search" placeholder="搜索课程、学科…" autocomplete="off">
      </div>
      <button class="theme-toggle" data-theme-toggle title="切换主题">🌗</button>
      <button class="ghost-btn" id="logout-btn" title="退出登录">退出</button>
    </div>
  </header>

  <main>
    <section id="recent-section" hidden>
      <h2 class="section-title">最近阅读</h2>
      <div id="recent" class="card-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">我的笔记</h2>
        <button class="create-btn" id="create-btn">＋ 创建课程</button>
      </div>
      <div id="courses" class="card-grid"></div>
      <p id="empty-hint" class="empty-state" hidden>还没有课程笔记，点「创建课程」上传一个 HTML 试试</p>
    </section>
  </main>

  <!-- 创建课程弹窗 -->
  <div class="modal-overlay" id="create-modal" hidden>
    <div class="modal">
      <h3>创建新课程</h3>
      <label class="field">
        <span>课程名称 <em>*</em></span>
        <input type="text" id="nc-title" placeholder="例如：电磁学复习" maxlength="80" autocomplete="off">
      </label>
      <div class="field-row">
        <label class="field">
          <span>学科（可选）</span>
          <input type="text" id="nc-subject" placeholder="例如：大学物理" maxlength="40" autocomplete="off">
        </label>
        <label class="field icon-field">
          <span>图标</span>
          <input type="text" id="nc-icon" value="📘" maxlength="4">
        </label>
      </div>
      <label class="field">
        <span>简介（可选）</span>
        <input type="text" id="nc-desc" placeholder="一句话描述" maxlength="120" autocomplete="off">
      </label>
      <label class="field">
        <span>笔记文件 <em>*</em></span>
        <input type="file" id="nc-file" accept=".html,.htm,.md,.markdown,.pdf,text/html,text/markdown,application/pdf">
      </label>
      <p class="modal-hint" id="nc-hint">支持 HTML / Markdown（≤1.5 MB）或 PDF（≤20 MB）。</p>
      <div class="btn-row">
        <button class="btn-cancel" id="nc-cancel" type="button">取消</button>
        <button class="btn-confirm" id="nc-submit" type="button">创建</button>
      </div>
    </div>
  </div>

  <script src="/assets/theme.js?v=20260607b"></script>
  <script src="/assets/app.js?v=20260607b"></script>
</body>
</html>
