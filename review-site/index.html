<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复习笔记</title>
  <script>
    // 首屏前定主题，避免浅/深闪烁；完整逻辑在 theme.js
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=20260607c">
  <link rel="stylesheet" href="/assets/style.css?v=20260608a">
</head>
<body class="home">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">📓</span>
      <span class="brand-name">复习笔记</span>
    </div>
    <div class="topbar-right">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="search" placeholder="搜索课程、学科…" autocomplete="off">
      </div>
      <div class="settings-wrap">
        <button class="settings-btn" id="settings-btn" title="设置" aria-haspopup="true" aria-expanded="false">⚙️</button>
        <div class="settings-menu" id="settings-menu" hidden role="menu">
          <div class="sm-section">
            <span class="sm-label">外观</span>
            <div class="seg" role="group" aria-label="主题">
              <button class="seg-btn" data-theme-set="auto" aria-pressed="false">跟随系统</button>
              <button class="seg-btn" data-theme-set="light" aria-pressed="false">☀️ 浅色</button>
              <button class="seg-btn" data-theme-set="dark" aria-pressed="false">🌙 深色</button>
            </div>
          </div>
          <div class="sm-divider"></div>
          <button class="sm-item" id="about-btn" role="menuitem"><span class="sm-ic">✨</span><span>关于</span></button>
          <button class="sm-item sm-danger" id="logout-btn" role="menuitem"><span class="sm-ic">⏻</span><span>退出登录</span></button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="recent-section" hidden>
      <h2 class="section-title">最近阅读</h2>
      <div id="recent" class="card-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">我的笔记</h2>
        <button class="create-btn" id="create-btn">＋ 创建课程</button>
      </div>
      <div id="courses" class="card-grid"></div>
      <p id="empty-hint" class="empty-state" hidden>还没有课程笔记，点「创建课程」上传一个 HTML 试试</p>
    </section>
  </main>

  <!-- 创建课程弹窗 -->
  <div class="modal-overlay" id="create-modal" hidden>
    <div class="modal">
      <h3>创建新课程</h3>
      <label class="field">
        <span>课程名称 <em>*</em></span>
        <input type="text" id="nc-title" placeholder="例如：电磁学复习" maxlength="80" autocomplete="off">
      </label>
      <label class="field">
        <span>笔记文件 <em>*</em></span>
        <input type="file" id="nc-file" accept=".html,.htm,.md,.markdown,.pdf,text/html,text/markdown,application/pdf">
      </label>
      <p class="modal-hint" id="nc-hint">支持 HTML / Markdown（≤1.5 MB）或 PDF（≤20 MB）。选好文件后可让 AI 自动填充。</p>

      <div class="ai-fill-row">
        <button class="ai-fill-btn" id="nc-ai" type="button">✨ AI 智能填充</button>
        <span class="ai-fill-status" id="nc-ai-status"></span>
      </div>

      <div class="field-row">
        <label class="field">
          <span>学科（可选）</span>
          <input type="text" id="nc-subject" placeholder="例如：大学物理" maxlength="40" autocomplete="off">
        </label>
        <label class="field">
          <span>简介（可选）</span>
          <input type="text" id="nc-desc" placeholder="一句话描述" maxlength="120" autocomplete="off">
        </label>
      </div>

      <div class="field">
        <span>标签</span>
        <div class="tag-chips" id="nc-tags"><span class="tag-empty">选文件后由 AI 生成，或留空</span></div>
      </div>

      <div class="field">
        <span>图标（点选一个）</span>
        <div class="icon-picker" id="nc-icon-picker"></div>
        <input type="hidden" id="nc-icon" value="📘">
      </div>
      <div class="btn-row">
        <button class="btn-cancel" id="nc-cancel" type="button">取消</button>
        <button class="btn-confirm" id="nc-submit" type="button">创建</button>
      </div>
    </div>
  </div>

  <!-- 关于 / 学习画像 -->
  <div class="modal-overlay about-overlay" id="about-modal" hidden>
    <div class="about-card" role="dialog" aria-modal="true" aria-label="关于">
      <button class="about-close" id="about-close" aria-label="关闭">✕</button>
      <div class="about-hero">
        <div class="about-aurora" aria-hidden="true"></div>
        <div class="about-hero-inner">
          <span class="about-emoji">🪐</span>
          <h2 class="about-title">你的学习画像</h2>
          <p class="about-sub" id="about-tagline">正在读取你的笔记宇宙…</p>
        </div>
      </div>
      <div class="about-body">
        <div class="about-stats" id="about-stats"></div>
        <div class="about-block" id="about-subjects-block" hidden>
          <span class="about-block-label">你正在钻研</span>
          <div class="about-chips" id="about-subjects"></div>
        </div>
        <p class="about-note" id="about-note"></p>
      </div>
      <div class="about-foot">
        <span class="about-foot-brand">📓 复习笔记 · AI 助教</span>
        <span class="about-foot-dim">本地优先 · 不收集隐私 · 以上小结只由你自己的课程数据生成</span>
      </div>
    </div>
  </div>

  <script src="/assets/theme.js?v=20260608a"></script>
  <script src="/assets/app.js?v=20260608a"></script>
</body>
</html>
