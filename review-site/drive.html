<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云盘 · Xi Notebook</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/png" href="/assets/favicon-xi.png?v=20260613d">
  <link rel="stylesheet" href="/assets/style.css?v=20260616a">
</head>
<body class="drive-page">
  <header class="topbar">
    <a class="brand drive-back" href="/" aria-label="返回首页" title="返回首页">
      <span class="ic" data-icon="back" data-icon-size="20"></span>
      <img class="brand-logo" src="/assets/brand-xinotebook.png?v=20260613d" alt="Xi Notebook">
    </a>
    <div class="topbar-right">
      <span class="drive-title"><span class="ic" data-icon="folder" data-icon-size="18"></span> 云盘</span>
      <span class="drive-role-badge" id="drive-role" hidden></span>
    </div>
  </header>

  <main class="drive-main">
    <div class="drive-bar">
      <nav class="drive-crumbs" id="drive-crumbs" aria-label="路径"></nav>
      <div class="drive-actions" id="drive-actions" hidden>
        <button class="pill-btn" id="mkdir-btn"><span class="ic" data-icon="folderplus" data-icon-size="16"></span><span class="pill-label">新建文件夹</span></button>
        <button class="pill-btn pill-primary" id="upload-btn"><span class="ic" data-icon="upload" data-icon-size="16"></span><span class="pill-label">上传</span></button>
        <input type="file" id="file-input" multiple hidden>
      </div>
    </div>

    <div class="drive-dropzone" id="drive-dropzone">
      <ul class="drive-list" id="drive-list"></ul>
      <p class="drive-empty" id="drive-empty" hidden></p>
      <div class="drive-drop-hint" id="drive-drop-hint">松开鼠标即可上传到当前文件夹</div>
    </div>

    <!-- 上传进度 -->
    <div class="drive-uploads" id="drive-uploads" hidden></div>
  </main>

  <script src="/assets/icons.js?v=20260616a"></script>
  <script src="/assets/theme.js?v=20260608a"></script>
  <script src="/assets/drive.js?v=20260616a"></script>
</body>
</html>
