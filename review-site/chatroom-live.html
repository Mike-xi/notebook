<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>实时房间 · 点对点聊天</title>
  <style>
    :root {
      --bg:#f3f4f6; --fg:#1c1b1f; --muted:#6b7280; --card:#ffffff; --border:#e3e6eb;
      --accent:#6750A4; --bubble-me:#6750A4; --bubble-me-fg:#fff; --bubble:#eceef2; --bubble-fg:#1c1b1f;
    }
    body.dark {
      --bg:#0f1115; --fg:#e6e1e5; --muted:#9aa0a6; --card:#1a1d23; --border:#2a2e36;
      --accent:#D0BCFF; --bubble-me:#4a3f86; --bubble-me-fg:#fff; --bubble:#23262e; --bubble-fg:#e6e1e5;
    }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; }
    html, body { margin:0; height:100%; }
    body {
      background:var(--bg); color:var(--fg); display:flex; flex-direction:column; height:100vh;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    header {
      flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:10px 14px;
      background:var(--card); border-bottom:1px solid var(--border);
    }
    header .back { text-decoration:none; color:var(--fg); font-size:20px; line-height:1; padding:4px 6px; border-radius:8px; }
    header .back:hover { background:var(--bubble); }
    header .title { font-weight:700; font-size:15px; flex:1 1 auto; min-width:0; }
    header .title small { display:block; font-weight:500; color:var(--muted); font-size:12px; }
    .pill { font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
    .dot { width:8px; height:8px; border-radius:50%; background:#bbb; }
    .dot.on { background:#22c55e; }
    .hbtn { border:1px solid var(--border); background:var(--bg); color:var(--fg); border-radius:8px; padding:5px 10px; font-size:12.5px; cursor:pointer; }
    .hbtn:hover { border-color:var(--accent); }

    #log { flex:1 1 auto; overflow-y:auto; padding:16px 14px 4px; display:flex; flex-direction:column; gap:8px; }
    .sys { align-self:center; font-size:12px; color:var(--muted); background:var(--bubble); padding:3px 12px; border-radius:999px; max-width:90%; text-align:center; }
    .row { display:flex; flex-direction:column; max-width:78%; }
    .row.me { align-self:flex-end; align-items:flex-end; }
    .row .who { font-size:11.5px; color:var(--muted); margin:0 4px 2px; }
    .bubble { padding:8px 12px; border-radius:14px; font-size:14.5px; line-height:1.5; word-break:break-word; white-space:pre-wrap;
      background:var(--bubble); color:var(--bubble-fg); border-top-left-radius:4px; }
    .row.me .bubble { background:var(--bubble-me); color:var(--bubble-me-fg); border-top-left-radius:14px; border-top-right-radius:4px; }

    footer { flex:0 0 auto; display:flex; gap:8px; padding:10px 12px; background:var(--card); border-top:1px solid var(--border); }
    #msg { flex:1 1 auto; resize:none; border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:15px;
      background:var(--bg); color:var(--fg); max-height:120px; min-height:42px; line-height:1.4; font-family:inherit; }
    #msg:focus { outline:none; border-color:var(--accent); }
    #send { flex:0 0 auto; border:none; border-radius:12px; padding:0 18px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
    #send:disabled { opacity:.5; cursor:default; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:10; }
    .modal .box { background:var(--card); color:var(--fg); border-radius:16px; padding:22px; width:100%; max-width:340px; }
    .modal h2 { margin:0 0 4px; font-size:17px; }
    .modal p { margin:0 0 14px; font-size:13px; color:var(--muted); line-height:1.6; }
    .modal label { display:block; font-size:12.5px; color:var(--muted); margin:10px 0 4px; }
    .modal input { width:100%; border:1px solid var(--border); border-radius:10px; padding:9px 11px; font-size:15px; background:var(--bg); color:var(--fg); }
    .modal .go { width:100%; margin-top:16px; border:none; border-radius:10px; padding:11px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
    .toast { position:fixed; left:50%; bottom:74px; transform:translateX(-50%); background:#111; color:#fff; padding:8px 16px; border-radius:999px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:20; }
    .toast.show { opacity:.92; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/" title="返回">‹</a>
    <div class="title">实时房间 <small id="room-label">—</small></div>
    <span class="pill"><span class="dot" id="conn-dot"></span><span id="online">连接中…</span></span>
    <button class="hbtn" id="invite">邀请</button>
  </header>

  <div id="log"></div>

  <footer>
    <textarea id="msg" placeholder="说点什么…（Enter 发送，Shift+Enter 换行）" rows="1" disabled></textarea>
    <button id="send" disabled>发送</button>
  </footer>

  <!-- 进入弹窗：设昵称 + 房间号 -->
  <div class="modal" id="gate">
    <div class="box">
      <h2>进入实时房间</h2>
      <p>点对点（P2P）即时聊天：消息直接在浏览器之间传递，不经过本站服务器、不留存历史。把邀请链接发给同学，进同一个房间就能聊。</p>
      <label for="g-name">你的昵称</label>
      <input id="g-name" maxlength="20" placeholder="例如：复习搭子">
      <label for="g-room">房间号</label>
      <input id="g-room" maxlength="32" placeholder="lobby">
      <button class="go" id="g-go">进入</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { joinRoom, selfId } from 'https://esm.sh/trystero@0.21.5';

    const APP_ID = 'nb-sjtu-review-live-chat-2026';
    const $ = (id) => document.getElementById(id);
    const logEl = $('log'), msgEl = $('msg'), sendBtn = $('send');

    // ---- 主题（跟随站点 localStorage nb-theme）----
    (function theme() {
      let t = 'auto';
      try { t = localStorage.getItem('nb-theme') || 'auto'; } catch {}
      const dark = t === 'dark' || (t === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
      document.body.classList.toggle('dark', dark);
    })();

    // ---- 状态 ----
    let room = null, sendMsg = null;
    const names = {};                 // peerId -> 昵称
    let myName = '匿名';
    let roomId = 'lobby';

    function toast(t) { const e = $('toast'); e.textContent = t; e.classList.add('show'); clearTimeout(e._t); e._t = setTimeout(() => e.classList.remove('show'), 1600); }
    function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    function addSys(text) {
      const d = document.createElement('div'); d.className = 'sys'; d.textContent = text;
      logEl.appendChild(d); scroll();
    }
    function addMsg(who, text, me) {
      const row = document.createElement('div'); row.className = 'row' + (me ? ' me' : '');
      if (!me) { const w = document.createElement('div'); w.className = 'who'; w.textContent = who; row.appendChild(w); }
      const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text; row.appendChild(b);
      logEl.appendChild(row); scroll();
    }
    function scroll() { logEl.scrollTop = logEl.scrollHeight; }

    function updateOnline() {
      const n = room ? Object.keys(room.getPeers()).length + 1 : 1;
      $('online').textContent = n > 1 ? `${n} 人在线` : '等待他人加入…';
      $('conn-dot').classList.toggle('on', n > 1);
    }

    function connect(name, rid) {
      myName = name; roomId = rid;
      $('room-label').textContent = '#' + roomId;
      document.title = `实时房间 #${roomId}`;
      room = joinRoom({ appId: APP_ID }, roomId);

      const [sM, getM] = room.makeAction('msg');
      const [sN, getN] = room.makeAction('name');
      sendMsg = sM;

      getM((data, peerId) => {
        if (data && typeof data.text === 'string') addMsg(names[peerId] || '匿名', data.text, false);
      });
      getN((data, peerId) => {
        const nm = (data && data.name ? String(data.name) : '').slice(0, 20) || '匿名';
        const first = !(peerId in names);
        names[peerId] = nm;
        if (first) addSys(`${nm} 加入了房间`);
        updateOnline();
      });

      room.onPeerJoin((peerId) => { sN({ name: myName }); updateOnline(); });
      room.onPeerLeave((peerId) => {
        const nm = names[peerId]; delete names[peerId];
        if (nm) addSys(`${nm} 离开了`);
        updateOnline();
      });

      msgEl.disabled = false; sendBtn.disabled = false; msgEl.focus();
      updateOnline();
      addSys('已进入房间。把右上角「邀请」链接发给同学即可一起聊。');

      // 调试钩子（?test 时供自动化检查）
      window.__chat = {
        selfId, roomId,
        send: (t) => { sendMsg({ text: t }); addMsg(myName, t, true); },
        peerCount: () => Object.keys(room.getPeers()).length,
        names: () => ({ ...names }),
        log: () => [...logEl.querySelectorAll('.bubble')].map((b) => b.textContent),
      };
    }

    function doSend() {
      const t = msgEl.value.trim();
      if (!t || !sendMsg) return;
      sendMsg({ text: t });
      addMsg(myName, t, true);
      msgEl.value = ''; autoGrow();
    }
    function autoGrow() { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(120, msgEl.scrollHeight) + 'px'; }

    sendBtn.addEventListener('click', doSend);
    msgEl.addEventListener('input', autoGrow);
    msgEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });

    $('invite').addEventListener('click', async () => {
      const url = `${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;
      try { await navigator.clipboard.writeText(url); toast('邀请链接已复制'); }
      catch { prompt('复制邀请链接：', url); }
    });

    // ---- 进入门 ----
    const qs = new URLSearchParams(location.search);
    const presetRoom = (qs.get('room') || '').trim();
    let savedName = ''; try { savedName = localStorage.getItem('nb-chat-name') || ''; } catch {}
    $('g-name').value = savedName || '同学' + Math.floor(Math.random() * 900 + 100);
    $('g-room').value = presetRoom || 'lobby';

    function enter() {
      const name = ($('g-name').value.trim() || '匿名').slice(0, 20);
      const rid = ($('g-room').value.trim() || 'lobby').slice(0, 32);
      try { localStorage.setItem('nb-chat-name', name); } catch {}
      $('gate').hidden = true;
      connect(name, rid);
    }
    $('g-go').addEventListener('click', enter);
    $('g-room').addEventListener('keydown', (e) => { if (e.key === 'Enter') enter(); });

    // ?test=auto 时自动进入（供自动化测试，跳过弹窗）
    if (qs.get('test')) { enter(); }
  </script>
</body>
</html>
