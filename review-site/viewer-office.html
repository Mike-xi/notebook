<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档预览</title>
  <style>
    :root { --c-bg:#f3f4f6; --c-fg:#24292f; --c-muted:#8a93a0; --c-border:#e6eaf0; --c-chip:#fff; --c-chipon:#0a243b; }
    body.dark { --c-bg:#0f1115; --c-fg:#d7d3da; --c-muted:#6b7280; --c-border:#2c2f36; --c-chip:#1b1e24; --c-chipon:#e9e6ee; }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; }
    html, body { margin:0; padding:0; height:100%; }
    body {
      background:var(--c-bg); color:var(--c-fg);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      transition:background-color .2s ease, color .2s ease;
    }
    #stage { height:100%; overflow:auto; }
    /* docx / pptx 渲染区域始终保持「纸张」浅底，文档观感才正确 */
    #doc { padding:18px 12px 60px; display:flex; flex-direction:column; align-items:center; gap:18px; }
    #doc .docx-wrapper { background:transparent !important; padding:0 !important; }
    #doc .docx { box-shadow:0 2px 14px rgba(0,0,0,.16); }
    /* pptx-preview 生成的幻灯片容器 */
    #doc .pptx-preview-wrapper, #doc canvas, #doc section { box-shadow:0 2px 14px rgba(0,0,0,.16); }

    /* 表格（xlsx/xls/ods）*/
    .xl-tabs { position:sticky; top:0; z-index:2; display:flex; gap:6px; flex-wrap:wrap;
      padding:8px 12px; background:var(--c-bg); border-bottom:1px solid var(--c-border); }
    .xl-tab { border:1px solid var(--c-border); background:var(--c-chip); color:var(--c-fg);
      padding:4px 12px; border-radius:999px; font-size:13px; cursor:pointer; }
    .xl-tab.active { background:var(--c-chipon); color:var(--c-bg); border-color:var(--c-chipon); }
    .xl-sheet { padding:14px 16px 60px; overflow:auto; }
    .xl-sheet table { border-collapse:collapse; font-size:13px; background:#fff; color:#24292f; }
    .xl-sheet td, .xl-sheet th { border:1px solid #d6dbe2; padding:4px 9px; white-space:nowrap;
      max-width:420px; overflow:hidden; text-overflow:ellipsis; }
    .xl-sheet tr:first-child td { background:#f6f8fa; font-weight:600; }

    #msg { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; color:var(--c-muted); font-size:14px; text-align:center; padding:30px; line-height:1.7; }
    .o-spin { width:20px; height:20px; border:2px solid currentColor; border-top-color:transparent;
      border-radius:50%; animation:ospin .8s linear infinite; }
    @keyframes ospin { to { transform:rotate(360deg); } }
    #msg a.dl { display:inline-block; text-decoration:none; padding:8px 18px; border-radius:10px;
      background:var(--c-chipon); color:var(--c-bg); font-weight:600; margin-top:4px; }
  </style>
</head>
<body>
  <div id="stage" hidden>
    <div id="tabs" class="xl-tabs" hidden></div>
    <div id="doc"></div>
  </div>
  <div id="msg"><span class="o-spin"></span><span class="msg-text">加载中…</span></div>

  <script src="/assets/office-viewer.js?v=20260617b"></script>
</body>
</html>
