<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手写笔记</title>
<script>
  // 跟随站点主题（与 xiangqi/gomoku 等自包含页同一套习惯）
  (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
</script>
<style>
  :root{
    --bg:#f3f1eb; --panel:#ffffff; --fg:#1c1b1f; --muted:#6b6772; --line:#e1dcd0;
    --accent:#b4690e; --on-accent:#fff; --chip:#efeae0; --danger:#b3261e; --shadow:rgba(20,15,5,.12);
  }
  html[data-theme="dark"]{
    --bg:#121212; --panel:#1c1c1e; --fg:#e6e1e5; --muted:#a9a3b0; --line:#302e2a;
    --accent:#e2a75a; --on-accent:#241a08; --chip:#26241f; --danger:#f2777a; --shadow:rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  [hidden]{display:none!important}
  body{
    background:var(--bg); color:var(--fg); height:100vh; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:11px;border:1px solid transparent;background:transparent;color:var(--fg);cursor:pointer;flex:0 0 auto}
  .icon-btn:hover{background:var(--chip)}
  .icon-btn.on{background:var(--accent);color:var(--on-accent)}
  .icon-btn:disabled{opacity:.35;cursor:default;background:transparent!important;color:var(--fg)!important}
  .icon-btn .ic{display:block}

  /* ---------- 书架首页 ---------- */
  #shelf-view{height:100%;display:flex;flex-direction:column}
  #shelf-view header{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  #shelf-view header a.back{color:var(--fg);text-decoration:none;font-size:21px;line-height:1;padding:4px 6px;border-radius:8px}
  #shelf-view header a.back:hover{background:var(--chip)}
  #shelf-view header .title{font-weight:700;font-size:16.5px;flex:1 1 auto}
  #new-book-btn{margin-left:auto;display:flex;align-items:center;gap:6px;border:none;border-radius:999px;background:var(--accent);color:var(--on-accent);padding:8px 16px 8px 12px;font-weight:600;font-size:14px;cursor:pointer}
  #new-book-btn:hover{filter:brightness(1.05)}
  #shelf-scroll{flex:1 1 auto;overflow-y:auto;padding:18px}
  #book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:18px 16px;max-width:960px;margin:0 auto}
  .book-card{cursor:pointer;position:relative}
  .book-cover{aspect-ratio:3/4;border-radius:10px 12px 12px 10px;box-shadow:0 6px 16px var(--shadow), inset 4px 0 0 rgba(0,0,0,.16);display:flex;align-items:flex-end;padding:12px;position:relative;overflow:hidden;transition:.15s}
  .book-card:hover .book-cover{transform:translateY(-2px);box-shadow:0 10px 22px var(--shadow), inset 4px 0 0 rgba(0,0,0,.16)}
  .book-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .book-cover img.page-peek{opacity:.92}
  .book-cover .bc-icon{position:relative;z-index:1;opacity:.85;color:#fff}
  .book-meta{margin-top:8px;font-size:13.5px;font-weight:600;line-height:1.3}
  .book-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .book-del,.book-edit{position:absolute;top:6px;width:26px;height:26px;border-radius:8px;border:none;background:rgba(0,0,0,.35);color:#fff;display:none;align-items:center;justify-content:center;cursor:pointer}
  .book-del{right:6px}
  .book-edit{right:38px}
  .book-card:hover .book-del,.book-card:hover .book-edit{display:flex}
  .book-del:hover,.book-edit:hover{background:rgba(0,0,0,.55)}
  .empty-hint{text-align:center;color:var(--muted);font-size:13.5px;margin-top:60px}

  /* ---------- 页面编辑视图 ---------- */
  #page-view{height:100%;display:flex;flex-direction:column}
  #toolbar{flex:0 0 auto;display:flex;align-items:center;gap:4px;padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap;position:relative;z-index:5}
  #toolbar .sep{width:1px;align-self:stretch;background:var(--line);margin:4px 6px}
  #book-title{font-weight:700;font-size:14.5px;margin-right:4px;max-width:20vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tool-group{display:flex;gap:2px}
  #pager{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin:0 4px}
  #pager button{background:none;border:none;color:var(--fg);font-size:19px;cursor:pointer;padding:2px 4px;border-radius:6px}
  #pager button:hover{background:var(--chip)}
  #pager button:disabled{opacity:.3;cursor:default}
  #pg-label{cursor:pointer;border-radius:6px;padding:2px 4px}
  #pg-label:hover{background:var(--chip)}
  #zoom-ctl{display:flex;align-items:center;gap:2px;margin:0 2px}
  #zoom-ctl button{background:none;border:none;color:var(--fg);cursor:pointer;border-radius:7px;padding:4px 7px;font-size:15px;line-height:1}
  #zoom-ctl button:hover{background:var(--chip)}
  #zoom-label{font-size:12px!important;color:var(--muted)!important;min-width:44px}
  .spacer{flex:1 1 auto}
  .swatch{width:22px;height:22px;border-radius:50%;border:2px solid var(--panel);box-shadow:0 0 0 1px var(--line);cursor:pointer;flex:0 0 auto}
  .swatch.on{box-shadow:0 0 0 2px var(--accent)}
  #cur-color{width:20px;height:20px;border-radius:50%;box-shadow:0 0 0 1px var(--line)}

  .popover{position:absolute;top:52px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 30px var(--shadow);padding:14px;z-index:20;width:230px}
  .popover h4{margin:0 0 8px;font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .swatch-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .size-row{display:flex;gap:6px}
  .size-opt{flex:1;border:1.5px solid var(--line);background:none;border-radius:9px;padding:9px 0;cursor:pointer;color:var(--fg);display:flex;align-items:center;justify-content:center}
  .size-opt .dot{background:currentColor;border-radius:50%}
  .size-opt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
  .menu-row{display:flex;flex-direction:column;gap:2px}
  .menu-opt{display:flex;align-items:center;gap:10px;border:none;background:none;padding:9px 8px;border-radius:9px;cursor:pointer;color:var(--fg);font-size:13.5px;text-align:left;width:100%}
  .menu-opt:hover{background:var(--chip)}
  .menu-opt.on{color:var(--accent);font-weight:700}
  .menu-opt .ic{color:var(--muted)}
  .menu-opt.on .ic{color:var(--accent)}

  #page-surface-wrap{flex:1 1 auto;overflow-y:auto;overflow-x:auto;padding:16px}
  #pages-col{display:flex;flex-direction:column;align-items:center;gap:22px;width:max-content;min-width:100%}
  .page-slot{position:relative;aspect-ratio:1240/1754;box-shadow:0 4px 22px var(--shadow);border-radius:6px;overflow:hidden;background:#fffdf8;flex:0 0 auto}
  .page-slot .slot-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .page-slot .slot-num{position:absolute;right:8px;bottom:6px;font-size:11px;color:#8a857c;background:rgba(255,253,248,.8);border-radius:4px;padding:0 5px;pointer-events:none}
  .page-surface{position:absolute;inset:0;background:#fffdf8}
  .page-surface canvas{position:absolute;inset:0;width:100%;height:100%}
  /* 手指在页面上要能滚动（浏览器原生 pan），笔/鼠标由 pointer 事件接管 */
  #ink-canvas{touch-action:manipulation;z-index:3}
  body.tool-select #ink-canvas{pointer-events:none}

  /* items 层：逻辑坐标 1240x1754，用 transform scale 适配显示宽度 */
  #items-layer{position:absolute;left:0;top:0;width:1240px;height:1754px;transform-origin:0 0;z-index:2;pointer-events:none}
  .np-item{position:absolute;pointer-events:none;user-select:none;-webkit-user-select:none;touch-action:none}
  body.tool-select .np-item{pointer-events:auto;cursor:move}
  .np-item .np-imgbox{position:absolute;inset:0;overflow:hidden;border-radius:2px}
  .np-item img{position:absolute;max-width:none;pointer-events:none;-webkit-user-drag:none}
  .np-item.sel{outline:2.5px solid var(--accent);outline-offset:2px}
  .np-handle{position:absolute;right:-14px;bottom:-14px;width:28px;height:28px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.3);cursor:nwse-resize;display:none;touch-action:none}
  .np-item.sel .np-handle{display:block}
  .np-float{position:absolute;left:0;top:-56px;display:none;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 6px 18px var(--shadow);padding:4px;white-space:nowrap}
  .np-item.sel .np-float{display:flex}
  .np-float button{border:none;background:none;color:var(--fg);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px}
  .np-float button:hover{background:var(--chip)}
  .np-float button.danger{color:var(--danger)}
  /* 文本块正文（纸张恒浅色，文字用固定深色不跟主题） */
  .np-md{min-height:34px;font-size:30px;line-height:1.5;color:#1c1c1e;word-break:break-word;padding:6px 10px}
  .np-md :first-child{margin-top:0}
  .np-md :last-child{margin-bottom:0}
  .np-md h4{font-size:1.25em;margin:.4em 0 .25em}
  .np-md h5{font-size:1.08em;margin:.35em 0 .2em}
  .np-md p{margin:.25em 0}
  .np-md ul,.np-md ol{margin:.25em 0;padding-left:1.4em}
  .np-md code{background:rgba(0,0,0,.07);border-radius:4px;padding:.08em .3em;font-size:.9em;font-family:ui-monospace,Consolas,monospace}
  .np-md pre{background:rgba(0,0,0,.07);border-radius:8px;padding:.5em .7em;overflow-x:auto}
  .np-md pre code{background:none;padding:0}
  .np-md blockquote{margin:.3em 0;padding:.1em .8em;border-left:4px solid rgba(0,0,0,.2);color:#4a4a4a}
  .np-md a{color:#1d4ed8}
  .np-md hr{border:none;border-top:1px solid rgba(0,0,0,.18);margin:.5em 0}
  .np-edit{position:absolute;inset:0;width:100%;height:100%;min-height:120px;border:2px dashed var(--accent);border-radius:4px;background:rgba(255,255,255,.96);color:#1c1c1e;font-size:30px;line-height:1.5;padding:6px 10px;resize:none;font-family:inherit;outline:none;box-sizing:border-box}

  /* 裁切模式 */
  .np-crop-veil{position:absolute;inset:0;pointer-events:auto;cursor:default}
  .np-crop-rect{position:absolute;border:2px solid #fff;outline:1px solid rgba(0,0,0,.5);box-shadow:0 0 0 9999px rgba(0,0,0,.45);cursor:move;touch-action:none}
  .np-crop-h{position:absolute;width:26px;height:26px;background:#fff;border:2px solid var(--accent);border-radius:50%;touch-action:none}
  .np-crop-h[data-c="nw"]{left:-13px;top:-13px;cursor:nwse-resize}
  .np-crop-h[data-c="ne"]{right:-13px;top:-13px;cursor:nesw-resize}
  .np-crop-h[data-c="sw"]{left:-13px;bottom:-13px;cursor:nesw-resize}
  .np-crop-h[data-c="se"]{right:-13px;bottom:-13px;cursor:nwse-resize}
  .np-crop-bar{position:absolute;top:-58px;right:0;display:flex;gap:6px}
  .np-crop-bar button{border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .np-crop-bar .ok{background:var(--accent);color:var(--on-accent)}
  .np-crop-bar .no{background:var(--panel);color:var(--fg);border:1px solid var(--line)}

  /* 缩略图条：默认隐藏，工具栏按钮开关 */
  #page-strip{flex:0 0 auto;display:flex;align-items:center;gap:10px;overflow-x:auto;padding:10px 14px;background:var(--panel);border-top:1px solid var(--line)}
  .thumb{position:relative;flex:0 0 auto;width:52px;aspect-ratio:1240/1754;border-radius:5px;border:2px solid transparent;overflow:hidden;background:#fff;cursor:pointer;box-shadow:0 1px 4px var(--shadow)}
  .thumb.on{border-color:var(--accent)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .idx{position:absolute;bottom:1px;right:3px;font-size:8.5px;color:var(--muted);background:rgba(255,255,255,.75);border-radius:3px;padding:0 2px}
  html[data-theme="dark"] .thumb .idx{background:rgba(0,0,0,.55);color:#ddd}
  .thumb .del{position:absolute;top:1px;right:1px;width:15px;height:15px;border-radius:4px;background:rgba(0,0,0,.5);color:#fff;border:none;display:none;font-size:10px;line-height:15px;padding:0;cursor:pointer}
  .thumb:hover .del{display:block}
  .thumb.add{display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--line);color:var(--muted)}
  .thumb{touch-action:none}
  .thumb.dragging{opacity:.4}
  .thumb.drop-before{box-shadow:-3px 0 0 var(--accent), 0 1px 4px var(--shadow)}
  .thumb.drop-after{box-shadow:3px 0 0 var(--accent), 0 1px 4px var(--shadow)}

  /* 禅模式：全屏只留文档 + 左上角四分之一圆展开钮 */
  body.np-zen #toolbar,body.np-zen #page-strip{display:none}
  body.np-zen #page-surface-wrap{padding:0}
  #expand-btn{position:fixed;left:0;top:0;width:58px;height:58px;border:none;border-radius:0 0 100% 0;background:color-mix(in srgb,var(--accent) 82%,transparent);color:var(--on-accent);cursor:pointer;z-index:40;display:flex;align-items:flex-start;justify-content:flex-start;padding:9px 0 0 9px;box-shadow:2px 2px 12px var(--shadow);opacity:.85}
  #expand-btn:hover{opacity:1}

  /* 通用弹窗 */
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border-radius:16px;padding:20px;width:min(92vw,380px);max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px var(--shadow)}
  .modal h3{margin:0 0 14px;font-size:16px}
  .modal h4{margin:12px 0 8px;font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .modal input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--fg);font-size:14.5px}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .modal .actions button{border:none;border-radius:999px;padding:9px 18px;font-size:14px;cursor:pointer}
  .modal .actions .cancel{background:var(--chip);color:var(--fg)}
  .modal .actions .ok{background:var(--accent);color:var(--on-accent);font-weight:600}
  /* 封面选择网格 */
  .cover-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .cover-opt{aspect-ratio:3/4;border-radius:7px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;position:relative;background:var(--chip)}
  .cover-opt img{width:100%;height:100%;object-fit:cover;display:block}
  .cover-opt.on{border-color:var(--accent)}
  .cover-opt .plain{position:absolute;inset:0}
  /* 纸张选择网格（加页/换纸共用） */
  .paper-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .paper-opt{border:2px solid var(--line);border-radius:8px;background:#fffdf8;cursor:pointer;aspect-ratio:3/4;position:relative;overflow:hidden;padding:0}
  .paper-opt.on{border-color:var(--accent)}
  .paper-opt canvas{width:100%;height:100%;display:block}
  .paper-opt .pl{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:10px;color:#6b6772;background:rgba(255,253,248,.85)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;padding:8px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60;max-width:86vw}
  .toast.show{opacity:.92}
</style>
</head>
<body>

  <div id="shelf-view">
    <header>
      <a class="back" href="/" title="返回">‹</a>
      <div class="title">手写笔记</div>
      <button id="new-book-btn"><span class="ic" data-icon="plus" data-icon-size="16"></span>新建笔记本</button>
    </header>
    <div id="shelf-scroll">
      <div id="book-grid"></div>
      <div class="empty-hint" id="shelf-empty" hidden>还没有笔记本，点右上角新建一个吧</div>
    </div>
  </div>

  <div id="page-view" hidden>
    <div id="toolbar">
      <button class="icon-btn" id="btn-back" title="返回书架"><span class="ic" data-icon="back" data-icon-size="18"></span></button>
      <div id="book-title"></div>
      <div class="sep"></div>
      <div class="tool-group">
        <button class="icon-btn" id="tool-pen" title="钢笔"><span class="ic" data-icon="pen" data-icon-size="18"></span></button>
        <button class="icon-btn" id="tool-highlighter" title="荧光笔"><span class="ic" data-icon="highlighter" data-icon-size="18"></span></button>
        <button class="icon-btn" id="tool-eraser" title="橡皮"><span class="ic" data-icon="eraser" data-icon-size="18"></span></button>
        <button class="icon-btn" id="tool-select" title="选择/移动（图片与文本）"><span class="ic" data-icon="cursor" data-icon-size="18"></span></button>
      </div>
      <button class="icon-btn" id="btn-style" title="颜色/粗细"><span id="cur-color"></span></button>
      <div class="sep"></div>
      <button class="icon-btn" id="btn-undo" title="撤销"><span class="ic" data-icon="undo" data-icon-size="18"></span></button>
      <button class="icon-btn" id="btn-redo" title="重做"><span class="ic" data-icon="undo" data-icon-size="18" style="transform:scaleX(-1)"></span></button>
      <div class="sep"></div>
      <button class="icon-btn" id="btn-insert" title="插入 / 新页 / 导入"><span class="ic" data-icon="plus" data-icon-size="19"></span></button>
      <button class="icon-btn" id="btn-paper" title="本页纸张样式"><span class="ic" data-icon="gridfour" data-icon-size="18"></span></button>
      <button class="icon-btn" id="btn-export" title="导出 PDF"><span class="ic" data-icon="export" data-icon-size="18"></span></button>
      <button class="icon-btn" id="btn-thumbs" title="页面缩略图"><span class="ic" data-icon="squaresfour" data-icon-size="18"></span></button>
      <button class="icon-btn" id="btn-zen" title="收起工具栏（专注模式）"><span class="ic" data-icon="cornersout" data-icon-size="18"></span></button>
      <div class="spacer"></div>
      <div id="zoom-ctl">
        <button id="zoom-out" title="缩小">−</button>
        <button id="zoom-label" title="点击恢复 100%">100%</button>
        <button id="zoom-in" title="放大">+</button>
      </div>
      <div id="pager">
        <button id="pg-prev">‹</button>
        <span id="pg-label" title="点击跳转到指定页">1 / 1</span>
        <button id="pg-next">›</button>
      </div>
      <button class="icon-btn" id="btn-viewset" title="视图设置"><span class="ic" data-icon="gear" data-icon-size="18"></span></button>

      <div class="popover" id="pop-style" hidden>
        <h4>颜色</h4>
        <div class="swatch-row" id="color-row"></div>
        <h4>粗细</h4>
        <div class="size-row" id="size-row"></div>
      </div>
      <div class="popover" id="pop-insert" hidden>
        <div class="menu-row" id="insert-menu"></div>
      </div>
      <div class="popover" id="pop-paper" hidden>
        <h4>本页纸张样式</h4>
        <div class="menu-row" id="paper-row"></div>
      </div>
      <div class="popover" id="pop-view" hidden>
        <h4>翻页方式</h4>
        <div class="menu-row" id="flip-row"></div>
      </div>
    </div>

    <div id="page-surface-wrap">
      <div id="pages-col"></div>
    </div>
    <!-- 活动页编辑器（JS 会把它挂进当前页的 slot 里） -->
    <div class="page-surface" id="page-surface" style="display:none">
      <canvas id="bg-canvas"></canvas>
      <div id="items-layer"></div>
      <canvas id="ink-canvas"></canvas>
    </div>

    <div id="page-strip" hidden></div>
  </div>

  <button id="expand-btn" hidden title="展开工具栏"><span class="ic" data-icon="cornersin" data-icon-size="20"></span></button>

  <!-- 新建/编辑笔记本 -->
  <div class="modal-mask" id="book-modal" hidden>
    <div class="modal">
      <h3 id="bm-title">新建笔记本</h3>
      <input type="text" id="nb-title" maxlength="60" placeholder="笔记本名称">
      <h4>封面</h4>
      <div class="cover-grid" id="nb-cover-grid"></div>
