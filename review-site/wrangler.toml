name = "review-site"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

# D1 数据库绑定
# 在 Cloudflare Dashboard 创建 D1 后，把 database_id 填进来
[[d1_databases]]
binding = "DB"
database_name = "review-db"
database_id = "f3c5143b-9d1d-4820-b254-a220b34e1fe1"

# 环境变量（敏感值不写在这里，用 wrangler secret 或 Dashboard 配置）
# 需要在 Pages 项目设置里配置：
#   SITE_PASSWORD  - 你的访问密码
#   AUTH_SECRET    - 任意随机字符串（用于签名 cookie，越长越好）
