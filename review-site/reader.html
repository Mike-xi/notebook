<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读器</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=20260607c">
  <link rel="stylesheet" href="/assets/style.css?v=20260608d">
</head>
<body class="reader">
  <iframe id="content" src="" title="复习文档"></iframe>

  <div class="reader-bar" id="reader-bar">
    <a class="rb-btn rb-back" href="/" title="返回笔记库">←</a>
    <button class="rb-btn" id="toc-toggle" title="目录" hidden>📑</button>
    <button class="rb-btn" id="chat-toggle" title="AI 对话">💬</button>
    <div class="rb-info">
      <span class="rb-subject" id="doc-subject"></span>
      <span class="rb-title" id="doc-title">加载中…</span>
    </div>
    <span class="rb-progress" id="progress-pct">0%</span>
    <button class="rb-btn" id="bookmark-btn" title="加书签">☆</button>
    <button class="rb-btn" id="bookmarks-toggle" title="书签列表">☰</button>
  </div>

  <!-- 鼠标移到顶部时唤出工具栏的感应区 -->
  <div class="reader-hotzone" id="reader-hotzone"></div>

  <aside id="bookmarks-panel" hidden>
    <div class="panel-header">
      <h3>书签</h3>
      <button class="icon-btn" id="panel-close">✕</button>
    </div>
    <ul id="bookmarks-list"></ul>
    <p id="bookmarks-empty" class="empty-hint">还没有书签</p>
  </aside>

  <aside id="toc-panel" hidden>
    <div class="panel-header">
      <h3>目录</h3>
      <button class="icon-btn" id="toc-close">✕</button>
    </div>
    <ul id="toc-list"></ul>
    <p id="toc-empty" class="empty-hint">本文档没有可用目录</p>
  </aside>

  <aside id="chat-panel" hidden>
    <div class="panel-header">
      <h3>AI 对话 <span id="chat-status" class="chat-status"></span></h3>
      <div class="ph-actions">
        <button class="icon-btn" id="chat-clear" title="清空对话历史">🗑</button>
        <button class="icon-btn" id="chat-close" title="关闭">✕</button>
      </div>
    </div>
    <div class="chat-model-bar">
      <span class="cmb-icon" aria-hidden="true">🧠</span>
      <label class="cmb-label" for="chat-model">模型</label>
      <div class="cmb-select">
        <select id="chat-model" title="选择 AI 模型"></select>
        <span class="cmb-caret" aria-hidden="true">▾</span>
      </div>
    </div>
    <div id="chat-msgs" class="chat-msgs">
      <p class="chat-hint" id="chat-hint">问我这篇笔记里的内容——我会带你定位到大致小节，并参考你的高亮和书签。也可以在正文里划选一段文字再「💬 问 AI」。</p>
    </div>
    <div id="chat-quote" class="chat-quote" hidden></div>
    <form id="chat-form" class="chat-form">
      <textarea id="chat-input" rows="1" placeholder="问点这篇笔记的内容…" autocomplete="off"></textarea>
      <button type="submit" id="chat-send" title="发送">↑</button>
    </form>
  </aside>

  <script src="/assets/theme.js?v=20260608a"></script>
  <script src="/assets/md.js?v=20260608d"></script>
  <script src="/assets/highlights.js?v=20260607d"></script>
  <script src="/assets/reader.js?v=20260608d"></script>
</body>
</html>
