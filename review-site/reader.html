<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读器</title>
  <link rel="stylesheet" href="/assets/style.css?v=20260605b">
</head>
<body class="reader">
  <iframe id="content" src="" title="复习文档"></iframe>

  <div class="reader-bar" id="reader-bar">
    <a class="rb-btn rb-back" href="/" title="返回笔记库">←</a>
    <div class="rb-info">
      <span class="rb-subject" id="doc-subject"></span>
      <span class="rb-title" id="doc-title">加载中…</span>
    </div>
    <span class="rb-progress" id="progress-pct">0%</span>
    <button class="rb-btn" id="bookmark-btn" title="加书签">☆</button>
    <button class="rb-btn" id="bookmarks-toggle" title="书签列表">☰</button>
  </div>

  <!-- 鼠标移到顶部时唤出工具栏的感应区 -->
  <div class="reader-hotzone" id="reader-hotzone"></div>

  <aside id="bookmarks-panel" hidden>
    <div class="panel-header">
      <h3>书签</h3>
      <button class="icon-btn" id="panel-close">✕</button>
    </div>
    <ul id="bookmarks-list"></ul>
    <p id="bookmarks-empty" class="empty-hint">还没有书签</p>
  </aside>

  <script src="/assets/reader.js?v=20260605b"></script>
</body>
</html>
