<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读器</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=20260607c">
  <link rel="stylesheet" href="/assets/style.css?v=20260607b">
</head>
<body class="reader">
  <iframe id="content" src="" title="复习文档"></iframe>

  <div class="reader-bar" id="reader-bar">
    <a class="rb-btn rb-back" href="/" title="返回笔记库">←</a>
    <button class="rb-btn" id="toc-toggle" title="目录" hidden>📑</button>
    <div class="rb-info">
      <span class="rb-subject" id="doc-subject"></span>
      <span class="rb-title" id="doc-title">加载中…</span>
    </div>
    <span class="rb-progress" id="progress-pct">0%</span>
    <button class="rb-btn" data-theme-toggle title="切换主题">🌗</button>
    <button class="rb-btn" id="bookmark-btn" title="加书签">☆</button>
    <button class="rb-btn" id="bookmarks-toggle" title="书签列表">☰</button>
  </div>

  <!-- 鼠标移到顶部时唤出工具栏的感应区 -->
  <div class="reader-hotzone" id="reader-hotzone"></div>

  <aside id="bookmarks-panel" hidden>
    <div class="panel-header">
      <h3>书签</h3>
      <button class="icon-btn" id="panel-close">✕</button>
    </div>
    <ul id="bookmarks-list"></ul>
    <p id="bookmarks-empty" class="empty-hint">还没有书签</p>
  </aside>

  <aside id="toc-panel" hidden>
    <div class="panel-header">
      <h3>目录</h3>
      <button class="icon-btn" id="toc-close">✕</button>
    </div>
    <ul id="toc-list"></ul>
    <p id="toc-empty" class="empty-hint">本文档没有可用目录</p>
  </aside>

  <script src="/assets/theme.js?v=20260607b"></script>
  <script src="/assets/highlights.js?v=20260607b"></script>
  <script src="/assets/reader.js?v=20260607b"></script>
</body>
</html>
