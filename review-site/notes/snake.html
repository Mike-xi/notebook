<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>贪吃蛇 · Snake</title>
<script>
(function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
</script>
<style>
  :root{
    --bg:#f2f7f3;--panel:#ffffff;--fg:#182019;--muted:#66756a;--line:#d8e4da;
    --acc:#18a558;--acc-on:#fff;--chip:#e7f1e9;--danger:#c4342a;
  }
  html[data-theme="dark"]{
    --bg:#0e1410;--panel:#171f19;--fg:#e3ece5;--muted:#9fb0a4;--line:#2b382e;
    --acc:#4cd587;--acc-on:#0a2415;--chip:#203025;--danger:#ff8d84;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px 12px calc(16px + env(safe-area-inset-bottom))}
  header{width:min(94vw,560px);display:flex;align-items:center;gap:10px;padding:6px 0 10px}
  .back{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:12px;padding:7px 12px;font-size:13px;font-weight:650;cursor:pointer;text-decoration:none}
  h1{font-size:18px;font-weight:800}
  h1 small{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em}
  .stats{margin-left:auto;display:flex;gap:8px}
  .pill{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:5px 12px;text-align:center;font-size:11px;color:var(--muted)}
  .pill b{display:block;font-size:17px;color:var(--fg);font-variant-numeric:tabular-nums}
  #wrap{position:relative;width:min(94vw,560px);aspect-ratio:1;border-radius:18px;overflow:hidden;
        background:#0c1a11;border:1px solid var(--line);touch-action:none;outline:none}
  canvas{display:block;width:100%;height:100%}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
           background:rgba(5,12,8,.72);color:#e9f5ec;text-align:center;padding:20px;backdrop-filter:blur(2px)}
  #overlay[hidden]{display:none}
  #overlay .big{font-size:44px}
  #overlay h2{font-size:20px}
  #overlay p{font-size:13px;color:#b9cdbf;max-width:320px}
  .btn{border:0;border-radius:999px;padding:10px 22px;font-size:15px;font-weight:750;cursor:pointer;background:var(--acc);color:var(--acc-on)}
  .bar{width:min(94vw,560px);display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .bar .btn.sub{background:var(--panel);color:var(--fg);border:1px solid var(--line);font-size:13px;padding:9px 16px}
  .speed{margin-left:auto;display:flex;gap:4px;background:var(--chip);border-radius:999px;padding:4px}
  .speed button{border:0;background:transparent;color:var(--muted);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .speed button.on{background:var(--acc);color:var(--acc-on)}
  #status{width:min(94vw,560px);color:var(--muted);font-size:12.5px;margin-top:8px;text-align:center}
  #dpad{display:none;grid-template-columns:repeat(3,54px);grid-auto-rows:54px;gap:6px;margin-top:12px}
  #dpad button{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:14px;font-size:20px;cursor:pointer;touch-action:manipulation}
  #dpad button:active{background:var(--acc);color:var(--acc-on)}
  @media (hover:none) and (pointer:coarse){ #dpad{display:grid} }
</style>
</head>
<body>
<header>
  <a class="back" href="/">‹ 主页</a>
  <h1>🐍 贪吃蛇<small>SNAKE</small></h1>
  <div class="stats">
    <span class="pill">分数<b id="score">0</b></span>
    <span class="pill">最高<b id="best">0</b></span>
  </div>
</header>

<div id="wrap" tabindex="0" aria-label="贪吃蛇棋盘">
  <canvas id="cv"></canvas>
  <div id="overlay">
    <div class="big" id="ovIcon">🐍</div>
    <h2 id="ovTitle">准备出发</h2>
    <p id="ovText">方向键 / WASD 控制；手机滑动棋盘或用下方方向键。空格暂停。</p>
    <button class="btn" id="ovBtn">开始游戏</button>
  </div>
</div>

<div class="bar">
  <button class="btn" id="btnGo">开始</button>
  <button class="btn sub" id="btnNew">重新开始</button>
  <div class="speed" id="speed">
    <button data-ms="170">悠闲</button>
    <button data-ms="120">标准</button>
    <button data-ms="80">疾速</button>
  </div>
</div>
<div id="status">等待开始 · 吃到苹果 +10 分</div>

<div id="dpad">
  <span></span><button data-d="up">▲</button><span></span>
  <button data-d="left">◀</button><span></span><button data-d="right">▶</button>
  <span></span><button data-d="down">▼</button><span></span>
</div>

<script>
(function(){
'use strict';
// 自管深浅色；若被外层注入整页反相则剥离（本页配色自洽，无需反相）
var strip=function(){document.documentElement.classList.remove('nb-dark-invert');};
strip(); try{ new MutationObserver(strip).observe(document.documentElement,{attributes:true,attributeFilter:['class']}); }catch(e){}

var N=21;                                  // 21×21 格
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var wrap=document.getElementById('wrap'), overlay=document.getElementById('overlay');
var elScore=document.getElementById('score'), elBest=document.getElementById('best'),
    elStatus=document.getElementById('status');
var snake, dir, ndir, food, score, timer=null, dead=false, stepMs=120, sizePx=0;

var best=0; try{ best=Number(localStorage.getItem('snake-best'))||0; }catch(e){}
try{ stepMs=Number(localStorage.getItem('snake-speed'))||120; }catch(e){}
elBest.textContent=best;

function fit(){
  var r=wrap.getBoundingClientRect(), d=Math.min(devicePixelRatio||1,2);
  sizePx=Math.max(1,Math.round(r.width*d));
  if(cv.width!==sizePx){ cv.width=sizePx; cv.height=sizePx; }
  draw();
}

function reset(){
  stop_();
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; ndir=dir; score=0; dead=false;
  elScore.textContent='0';
  drop();
  say('等待开始 · 吃到苹果 +10 分');
  draw();
}

function drop(){
  var used={}; snake.forEach(function(p){used[p.x+','+p.y]=1;});
  var free=[];
  for(var y=0;y<N;y++)for(var x=0;x<N;x++)if(!used[x+','+y])free.push({x:x,y:y});
  if(!free.length){ over(true); return; }
  food=free[(Math.random()*free.length)|0];
}

function go(){
  if(timer) return;
  if(dead) reset();
  overlay.hidden=true;
  document.getElementById('btnGo').textContent='暂停';
  say('游戏进行中 · 别撞墙也别咬自己');
  timer=setInterval(tick,stepMs);
  wrap.focus({preventScroll:true});
}
function stop_(){
  if(timer){ clearInterval(timer); timer=null; }
  document.getElementById('btnGo').textContent='开始';
}
function pauseToggle(){
  if(dead){ go(); return; }
  if(timer){ stop_(); say('已暂停 · 空格或点「开始」继续'); }
  else go();
}

function over(won){
  stop_(); dead=true;
  if(score>best){ best=score; elBest.textContent=best; try{localStorage.setItem('snake-best',String(best));}catch(e){} }
  say(won?'棋盘填满，完美通关！':'游戏结束 · 得分 '+score);
  document.getElementById('ovIcon').textContent=won?'🏆':'💥';
  document.getElementById('ovTitle').textContent=won?'完美通关':'撞到了';
  document.getElementById('ovText').textContent='得分 '+score+' · 最高 '+best;
  document.getElementById('ovBtn').textContent='再来一局';
  overlay.hidden=false;
}

function tick(){
  dir=ndir;
  var h={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  var eat=(h.x===food.x&&h.y===food.y);
  if(h.x<0||h.y<0||h.x>=N||h.y>=N){ over(false); return; }
  var body=eat?snake:snake.slice(0,-1);
  for(var i=0;i<body.length;i++) if(body[i].x===h.x&&body[i].y===h.y){ over(false); return; }
  snake.unshift(h);
  if(eat){ score+=10; elScore.textContent=score; drop(); }
  else snake.pop();
  draw();
}

function draw(){
  if(!sizePx) return;
  var s=sizePx, c=s/N;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#0c1a11'; ctx.fillRect(0,0,s,s);
  ctx.strokeStyle='rgba(120,220,160,.06)'; ctx.lineWidth=1;
  for(var i=1;i<N;i++){
    var p=Math.round(i*c)+.5;
    ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(s,p);ctx.stroke();
  }
  // 苹果
  if(food){
    var fx=(food.x+.5)*c, fy=(food.y+.5)*c;
    ctx.fillStyle='#ff5349';
    ctx.beginPath();ctx.arc(fx,fy,c*.32,0,6.284);ctx.fill();
    ctx.fillStyle='#78c850';
    ctx.beginPath();ctx.ellipse(fx+c*.12,fy-c*.3,c*.12,c*.06,-0.6,0,6.284);ctx.fill();
  }
  // 蛇
  for(var k=snake.length-1;k>=0;k--){
    var seg=snake[k], pad=(k===0? .06 : .1)*c;
    var t=1-Math.min(.55,k/Math.max(10,snake.length));
    ctx.fillStyle=k===0?'#7bf0a5':'rgb('+(46+40*t|0)+','+(160+60*t|0)+','+(95+30*t|0)+')';
    rr(seg.x*c+pad, seg.y*c+pad, c-2*pad, c*.26);
    ctx.fill();
  }
  // 眼睛
  var hd=snake[0], ex=(dir.y!==0)?.16:.05, ey=(dir.x!==0)?.16:.05;
  ctx.fillStyle='#0b2013';
  ctx.beginPath();ctx.arc((hd.x+.5+dir.x*.18+ex)*c,(hd.y+.5+dir.y*.18+ey)*c,Math.max(1.5,c*.055),0,6.284);ctx.fill();
  ctx.beginPath();ctx.arc((hd.x+.5+dir.x*.18-ex)*c,(hd.y+.5+dir.y*.18-ey)*c,Math.max(1.5,c*.055),0,6.284);ctx.fill();
}
function rr(x,y,w,r){
  var q=Math.min(r,w/2);
  ctx.beginPath();
  ctx.moveTo(x+q,y);ctx.arcTo(x+w,y,x+w,y+w,q);ctx.arcTo(x+w,y+w,x,y+w,q);
  ctx.arcTo(x,y+w,x,y,q);ctx.arcTo(x,y,x+w,y,q);ctx.closePath();
}

function say(t){ elStatus.textContent=t; }
function steer(x,y){
  if(x===-dir.x&&y===-dir.y) return;
  ndir={x:x,y:y};
  if(!timer&&!dead) go();
}

var KEYS={arrowup:[0,-1],w:[0,-1],arrowdown:[0,1],s:[0,1],arrowleft:[-1,0],a:[-1,0],arrowright:[1,0],d:[1,0]};
addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  if(KEYS[k]){ e.preventDefault(); steer(KEYS[k][0],KEYS[k][1]); }
  else if(k===' '){ e.preventDefault(); pauseToggle(); }
  else if(k==='enter'&&!timer){ e.preventDefault(); go(); }
},{passive:false});

var t0=null;
wrap.addEventListener('pointerdown',function(e){ t0={x:e.clientX,y:e.clientY}; });
wrap.addEventListener('pointerup',function(e){
  if(!t0) return;
  var dx=e.clientX-t0.x, dy=e.clientY-t0.y; t0=null;
  if(Math.max(Math.abs(dx),Math.abs(dy))<18) return;
  if(Math.abs(dx)>Math.abs(dy)) steer(dx>0?1:-1,0); else steer(0,dy>0?1:-1);
});
document.getElementById('dpad').addEventListener('click',function(e){
  var b=e.target.closest('[data-d]'); if(!b) return;
  var m={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[b.dataset.d];
  steer(m[0],m[1]);
});
document.getElementById('ovBtn').addEventListener('click',go);
document.getElementById('btnGo').addEventListener('click',pauseToggle);
document.getElementById('btnNew').addEventListener('click',function(){ reset(); go(); });
var speedBox=document.getElementById('speed');
speedBox.addEventListener('click',function(e){
  var b=e.target.closest('[data-ms]'); if(!b) return;
  stepMs=Number(b.dataset.ms);
  try{localStorage.setItem('snake-speed',String(stepMs));}catch(err){}
  speedBox.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
  if(timer){ clearInterval(timer); timer=setInterval(tick,stepMs); }
});
speedBox.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',Number(x.dataset.ms)===stepMs);});
document.addEventListener('visibilitychange',function(){ if(document.hidden&&timer) pauseToggle(); });
addEventListener('resize',fit);

reset(); fit();
})();
</script>
</body>
</html>
