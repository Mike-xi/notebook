<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机器学习期末复习</title>
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 24px;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      line-height: 1.75;
      color: #1c1b1f;
    }
    h1, h2 { color: #6750A4; letter-spacing: -0.01em; }
    h1 { font-size: 32px; margin-bottom: 4px; }
    h2 { font-size: 22px; margin-top: 48px; }
    code {
      background: #F3EDF7;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    .placeholder {
      padding: 24px;
      background: #F3EDF7;
      border-radius: 12px;
      color: #49454F;
      font-size: 14px;
      margin: 24px 0;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #141218; color: #E6E1E5; }
      h1, h2 { color: #D0BCFF; }
      code, .placeholder { background: #211F26; color: #CAC4D0; }
    }
  </style>
</head>
<body>
  <h1>机器学习期末复习</h1>
  <p style="color: #79747e">示例笔记 · 把你真正的复习 HTML 替换掉这个文件就行</p>

  <div class="placeholder">
    💡 把你之前用来复习的 HTML 文件（CNN、SVM、PCA 这些）丢到
    <code>notes/</code> 目录下，然后在 <code>courses.json</code> 里加一条记录即可。
  </div>

  <h2>1. 监督学习</h2>
  <p>包括分类与回归。常见算法：逻辑回归、SVM、决策树、随机森林等。</p>

  <h2>2. 无监督学习</h2>
  <p>聚类（K-means）、降维（PCA、t-SNE）等。</p>

  <h2>3. 深度学习</h2>
  <p>CNN、ResNet、反向传播等核心概念。</p>

  <!-- 撑高页面便于测试滚动进度 -->
  <div style="height: 1200px; padding: 24px 0;">
    <p style="color: #79747e; font-size: 13px;">↓ 滚动一下，下次进来会自动恢复到这个位置</p>
  </div>

  <h2>到底了</h2>
