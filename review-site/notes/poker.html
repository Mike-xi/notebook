<script>
  // 跟随站点主题；本页自管配色并剥离阅读器整体反相（nb-dark-invert）。
  (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
</script>
<style>

  *{box-sizing:border-box}

  button{font:inherit}
  /* ---------- 落地页 ---------- */

  .glist{display:grid; grid-template-columns:1fr 1fr; gap:14px}

  .gtile{display:flex; gap:14px; align-items:center; text-align:left; padding:18px; border:1px solid var(--line);

  .gtile:hover{transform:translateY(-2px); border-color:var(--accent)}

  .gtile small{display:block; color:var(--muted); font-size:12.5px; margin-top:3px; line-height:1.5}

  /* ---------- 游戏外壳 ---------- */

  .topbar .back{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:var(--bg);
    color:var(--fg); border-radius:999px; padding:7px 13px; font-size:13.5px; font-weight:600; cursor:pointer}
  .topbar .back:hover{background:var(--chip)}
  .topbar .gt{font-size:15px; font-weight:700}
  .topbar .sp{flex:1}
  .topbar .tools{display:flex; gap:7px; flex-wrap:wrap}
  .tbtn{border:1px solid var(--line); background:var(--bg); color:var(--fg); border-radius:999px;
    padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer}
  .tbtn:hover{background:var(--chip)} .tbtn.on{background:var(--accent); color:var(--on-accent); border-color:transparent}
  .board{flex:1; position:relative}
  /* ---------- 扑克牌通用 ---------- */
  .pc{position:relative; background:var(--cardbg); border:1px solid var(--cardline); border-radius:7px;
    width:var(--cw,62px); height:var(--ch,86px); box-shadow:0 1px 2px var(--shadow); color:var(--blk);
    user-select:none; flex:0 0 auto; font-variant-numeric:tabular-nums}
  .pc.red{color:var(--red)}
  .pc .c{position:absolute; line-height:1; display:flex; flex-direction:column; align-items:center; font-weight:800}
  .pc .c b{font-size:calc(var(--cw,62px)*.26)} .pc .c i{font-style:normal; font-size:calc(var(--cw,62px)*.24); margin-top:-1px}
  .pc .c.tl{top:4px; left:4px} .pc .c.br{bottom:4px; right:4px; transform:rotate(180deg)}
  .pc .pip{position:absolute; inset:0; display:grid; place-items:center; font-size:calc(var(--cw,62px)*.5); opacity:.92}
  .pc.back{background:repeating-linear-gradient(45deg,var(--back),var(--back) 6px,color-mix(in srgb,var(--back) 75%,#000) 6px,color-mix(in srgb,var(--back) 75%,#000) 12px);
    border-color:color-mix(in srgb,var(--back) 60%,#000)}
  .pc.back::after{content:""; position:absolute; inset:5px; border:1.5px solid rgba(255,255,255,.45); border-radius:5px}
  .pc.joker{color:var(--blk)} .pc.joker.big{color:var(--red)}
  .pc.joker .jk{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-90deg); font-size:calc(var(--cw,62px)*.2); font-weight:800; letter-spacing:1px}
  .pc.joker .c b{font-size:calc(var(--cw,62px)*.2)}
  .pc.sel{outline:2px solid var(--accent); outline-offset:1px}
  /* ---------- 斗地主 ---------- */
  #ddz{position:absolute; inset:0; display:flex; flex-direction:column; background:
    radial-gradient(120% 80% at 50% 0%,var(--felt) 0%,var(--felt2) 100%); color:#eafdf3}
  .ddz-top{display:flex; justify-content:space-between; padding:14px 18px 0}
  .seatbox{display:flex; flex-direction:column; align-items:center; gap:6px; min-width:120px}
  .seatbox.right{align-items:flex-end} .seatbox.left{align-items:flex-start}
  .avatar{display:flex; align-items:center; gap:8px; background:rgba(0,0,0,.26); padding:7px 12px; border-radius:999px; font-size:13px}
  .avatar .ic{font-size:20px}
  .avatar .role{font-size:11px; padding:1px 7px; border-radius:999px; background:#0006; margin-left:2px}
  .avatar .role.ll{background:var(--accent); color:#fff; font-weight:700}
  .handcount{font-size:12px; opacity:.85}
  .aibubble{min-height:18px; font-size:12.5px; background:rgba(0,0,0,.22); padding:3px 10px; border-radius:999px; max-width:160px; text-align:center}
  .aibubble.think{font-style:italic; opacity:.7}
  .minicards{display:flex; min-height:var(--mch,54px)}
  .minicards .pc{--cw:38px; --ch:54px; margin-left:-22px} .minicards .pc:first-child{margin-left:0}
  .ddz-center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:6px}
  .trick{display:flex; align-items:center; gap:40px; min-height:60px}
  .trickslot{display:flex; flex-direction:column; align-items:center; gap:4px; min-height:64px}
  .trickslot .lbl{font-size:11px; opacity:.7}
  .bottomcards{display:flex; gap:5px; align-items:center}
  .bottomcards .pc{--cw:40px; --ch:56px}
  .bottomcards .tag{font-size:12px; opacity:.8; margin-right:4px}
  .statusline{font-size:13.5px; font-weight:600; min-height:20px; text-shadow:0 1px 2px #0006}
  .ddz-bottom{padding:0 14px 16px}
  .myhand{display:flex; justify-content:center; padding:8px 0 12px; min-height:var(--ch,96px); flex-wrap:nowrap; overflow-x:auto}
  #ddz{--cw:64px; --ch:90px}
  .myhand .pc{--cw:64px; --ch:90px; margin-left:-30px; cursor:pointer; transition:transform .1s}
  .myhand .pc:first-child{margin-left:0}
  .myhand .pc.sel{transform:translateY(-18px)}
  .myhand .pc.playable:hover{transform:translateY(-10px)}
  .ddz-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; min-height:46px}
  .abtn{border:0; border-radius:999px; padding:12px 24px; font-size:15px; font-weight:700; cursor:pointer;
    background:rgba(255,255,255,.16); color:#fff; backdrop-filter:blur(4px)}
  .abtn:hover{background:rgba(255,255,255,.26)} .abtn:disabled{opacity:.4; cursor:not-allowed}
  .abtn.primary{background:var(--accent); color:#fff} .abtn.gold{background:#e0a528; color:#3a2700}
  .ddz-overlay{position:absolute; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:20}
  .ddz-result{background:var(--panel); color:var(--fg); border-radius:18px; padding:28px 32px; text-align:center; max-width:340px; box-shadow:0 20px 60px #000a}
  .ddz-result h2{margin:0 0 8px; font-size:24px} .ddz-result .big{font-size:40px; margin:6px 0}
  .ddz-result p{color:var(--muted); margin:6px 0 18px; font-size:14px}
  /* ---------- 单人纸牌通用棋盘 ---------- */
  .soli{position:absolute; inset:0; background:radial-gradient(120% 80% at 50% 0%,var(--felt) 0%,var(--felt2) 100%);
    padding:14px; overflow:auto; color:#eafdf3; --cw:74px; --ch:104px}
  .soli-info{display:flex; gap:18px; align-items:center; font-size:13.5px; margin-bottom:10px; flex-wrap:wrap}
  .soli-info .badge{background:rgba(0,0,0,.25); padding:5px 12px; border-radius:999px}
  .soli-top{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap}
  .pile{position:relative; width:var(--cw); flex:0 0 auto}
  .pile.slot{height:var(--ch); border:2px dashed rgba(255,255,255,.3); border-radius:9px}
  .tableau{display:flex; gap:clamp(6px,1.4vw,14px)}
  .col{position:relative; width:var(--cw); flex:0 0 auto; min-height:var(--ch)}
  .col.slot, .pile.empty{border:2px dashed rgba(255,255,255,.28); border-radius:9px; min-height:var(--ch)}
  .col .pc, .pile .pc{position:absolute; left:0; cursor:default}
  .col .pc.drag-on{cursor:grab} .col .pc.drag-on:active{cursor:grabbing}
  #dragLayer{position:fixed; left:0; top:0; pointer-events:none; z-index:9999}
  #dragLayer .pc{position:absolute; left:0; box-shadow:0 10px 24px rgba(0,0,0,.45)}
  .pulse{animation:pl .5s ease} @keyframes pl{0%{box-shadow:0 0 0 0 #ffd86688}70%{box-shadow:0 0 0 10px #ffd86600}}
  /* ---------- 21点 ---------- */
  .bj{position:absolute; inset:0; background:radial-gradient(120% 80% at 50% 0%,var(--felt) 0%,var(--felt2) 100%);
    display:flex; flex-direction:column; align-items:center; color:#eafdf3; padding:16px; --cw:72px; --ch:100px}
  .bj-area{flex:1; width:100%; max-width:560px; display:flex; flex-direction:column; justify-content:space-between}
  .bj-row{text-align:center}
  .bj-row h3{margin:0 0 8px; font-size:14px; font-weight:700; opacity:.9}
  .bj-cards{display:flex; gap:8px; justify-content:center; min-height:var(--ch)}
  .bj-cards .pc{box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .bj-score{font-size:13px; opacity:.85; margin-top:6px; min-height:18px}
  .bj-bank{display:flex; gap:16px; align-items:center; justify-content:center; font-size:14px; margin:8px 0}
  .bj-bank b{font-size:18px}
  .bj-msg{text-align:center; font-size:16px; font-weight:700; min-height:24px; margin:6px 0; text-shadow:0 1px 2px #0006}
  .bj-actions{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding-bottom:6px}
  .bj-chips{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:4px 0}
  .chipb{border:0; width:54px; height:54px; border-radius:50%; font-weight:800; font-size:14px; cursor:pointer;
    color:#fff; box-shadow:0 4px 10px rgba(0,0,0,.4); border:3px dashed rgba(255,255,255,.6)}
  .chipb:hover{transform:translateY(-2px)} .chipb:disabled{opacity:.35}
</style>

<body>
<div id="home">
  <h1>🃏 扑克牌</h1>
  <p class="sub">四种主流玩法 · 纯前端离线可玩 · 跟随站点深浅色</p>
  <div class="glist" id="glist"></div>
  <div class="homefoot">
    斗地主对手为本地启发式 AI（叫分 / 出牌 / 跟牌 / 配合），离线即可整局对战；
    蜘蛛纸牌与接龙支持鼠标拖拽与双击自动归位；21 点为虚拟筹码，仅供娱乐。
  </div>
</div>

<div id="screen" class="hide">
  <div class="topbar">
    <button class="back" id="backBtn">‹ 玩法</button>
    <span class="gt" id="screenTitle"></span>
    <span class="sp"></span>
    <div class="tools" id="screenTools"></div>
  </div>
  <div class="board" id="board"></div>
</div>
<div id="dragLayer"></div>

<script type="module">
import {
  makeDeck as ddzDeck, shuffle, sortHand, parseCombo, comboBeats, comboName,
  enumerateBeats, leadOptions, aiBid, aiPlay, rankLabel as ddzRankLabel,
} from '../assets/poker-engine.js?v=20260620a';

/* ============================ 共用工具 ============================ */
const $ = (sel, r = document) => r.querySelector(sel);
const board = $('#board'), screen = $('#screen'), home = $('#home');
const screenTitle = $('#screenTitle'), screenTools = $('#screenTools');
const SUIT = ['♠', '♥', '♣', '♦'];
const isRedSuit = s => s === 1 || s === 3;
function lbl(r) { return ({ 1: 'A', 11: 'J', 12: 'Q', 13: 'K' })[r] || String(r); } // 单人纸牌 1..13

// 通用牌面元素：mode 'std' 用 label+suitIdx；'ddz' 传引擎卡对象
function cardFace({ label, suit, faceUp = true, joker = null }) {
  const d = document.createElement('div');
  d.className = 'pc';
  if (!faceUp) { d.classList.add('back'); return d; }
  if (joker) {
    d.classList.add('joker', joker === 'big' ? 'big' : 'small');
    d.innerHTML = `<span class="c tl"><b>${joker === 'big' ? '大' : '小'}</b><i>王</i></span><span class="jk">JOKER</span>`;
    return d;
  }
  if (isRedSuit(suit)) d.classList.add('red');
  const sc = SUIT[suit];
  d.innerHTML = `<span class="c tl"><b>${label}</b><i>${sc}</i></span><span class="pip">${sc}</span><span class="c br"><b>${label}</b><i>${sc}</i></span>`;
  return d;
}
// 引擎卡 -> 牌面
function ddzCardFace(c, faceUp = true) {
  if (!faceUp) return cardFace({ faceUp: false });
  if (c.r === 16) return cardFace({ joker: 'small' });
  if (c.r === 17) return cardFace({ joker: 'big' });
  return cardFace({ label: ddzRankLabel(c.r), suit: c.s });
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ============================ 路由 ============================ */
const GAMES = {};
let active = null;
function registerGame(id, def) { GAMES[id] = def; }
function openGame(id) {
  const g = GAMES[id]; if (!g) return;
  if (active && active.unmount) active.unmount();
  board.innerHTML = ''; screenTools.innerHTML = '';
  screenTitle.textContent = g.title;
  home.classList.add('hide'); screen.classList.remove('hide');
  active = g; g.mount(board, screenTools);
  location.hash = id;
}
function goHome() {
  if (active && active.unmount) active.unmount();
  active = null; board.innerHTML = ''; screenTools.innerHTML = '';
  screen.classList.add('hide'); home.classList.remove('hide');
  location.hash = '';
}
$('#backBtn').onclick = goHome;
window.addEventListener('hashchange', () => { const h = location.hash.slice(1); if (!h) { if (active) goHome(); } else if (GAMES[h] && active !== GAMES[h]) openGame(h); });

function renderHome() {
  const gl = $('#glist'); gl.innerHTML = '';
  for (const id in GAMES) {
    const g = GAMES[id];
    const b = document.createElement('button');
    b.className = 'gtile';
    b.innerHTML = `<span class="em">${g.emoji}</span><span><b>${g.title}</b><small>${g.desc}</small></span>`;
    b.onclick = () => openGame(id);
    gl.appendChild(b);
  }
}

/* 剥离阅读器注入的整体反相，避免牌桌被翻色 */
function stripReaderInvert() {
  const strip = () => { document.documentElement.classList.remove('nb-dark-invert'); document.body && document.body.classList.remove('nb-dark-invert'); };
  strip();
  new MutationObserver(strip).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  // 跟随站点主题切换
  addEventListener('storage', e => { if (e.key === 'nb-theme') applyTheme(); });
}
function applyTheme() { try { const p = localStorage.getItem('nb-theme') || 'auto'; const d = p === 'dark' || (p === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches); document.documentElement.dataset.theme = d ? 'dark' : 'light'; } catch (e) { } }

/* ============================ 斗地主 ============================ */
registerGame('ddz', (() => {
  const NAMES = ['你', '下家', '上家']; // 座位 0 我，1 右(下家)，2 左(上家)；出牌顺序 0->1->2
  let S = null, hintIdx = -1, hintList = null;

  function mount(root, tools) {
    root.innerHTML = `
    <div id="ddz">
      <div class="ddz-top">
        <div class="seatbox left" id="seat2">
          <div class="avatar"><span class="ic">🤖</span><span class="nm">上家</span><span class="role" id="role2"></span></div>
          <div class="aibubble" id="bub2"></div>
          <div class="minicards" id="play2"></div>
          <div class="handcount" id="cnt2"></div>
        </div>
        <div class="seatbox right" id="seat1">
          <div class="avatar"><span class="ic">🤖</span><span class="nm">下家</span><span class="role" id="role1"></span></div>
          <div class="aibubble" id="bub1"></div>
          <div class="minicards" id="play1"></div>
          <div class="handcount" id="cnt1"></div>
        </div>
      </div>
      <div class="ddz-center">
        <div class="bottomcards" id="bottomRow"></div>
        <div class="trick">
          <div class="trickslot"><div class="lbl">上家</div><div class="minicards" id="trick2"></div></div>
          <div class="trickslot"><div class="lbl">我</div><div class="minicards" id="trick0"></div></div>
          <div class="trickslot"><div class="lbl">下家</div><div class="minicards" id="trick1"></div></div>
        </div>
        <div class="statusline" id="ddzStatus"></div>
      </div>
      <div class="ddz-bottom">
        <div class="myhand" id="myhand"></div>
        <div class="ddz-actions" id="ddzActions"></div>
      </div>
      <div class="ddz-overlay hide" id="ddzOver"></div>
    </div>`;
    const t = document.createElement('button'); t.className = 'tbtn'; t.textContent = '重开'; t.onclick = newGame; tools.appendChild(t);
    newGame();
  }

  function newGame() {
    const deck = shuffle(ddzDeck());
    const hands = [sortHand(deck.slice(0, 17)), sortHand(deck.slice(17, 34)), sortHand(deck.slice(34, 51))];
    const bottom = deck.slice(51, 54);
    S = {
      hands, bottom, landlord: -1, roles: [null, null, null], phase: 'bid',
      turn: -1, target: null, targetSeat: -1, passes: 0, lastPlay: [null, null, null],
      bid: { order: [], idx: 0, max: 0, leader: -1 }, multiplier: 1, bombs: 0,
      everFarmerPlayed: false, llPlays: 0,
    };
    $('#ddzOver').classList.add('hide');
    renderAll();
    startBidding();
  }

  /* ---- 叫地主 ---- */
  function startBidding() {
    const start = Math.floor(Math.random() * 3);
    S.bid.order = [start, (start + 1) % 3, (start + 2) % 3];
    S.bid.idx = 0; S.bid.max = 0; S.bid.leader = -1;
    setStatus('叫地主阶段');
    nextBid();
  }
  function nextBid() {
    if (S.bid.idx >= 3 || S.bid.max === 3) return finishBidding();
    const seat = S.bid.order[S.bid.idx];
    if (seat === 0) { showBidUI(); }
    else {
      setBubble(seat, '…', true);
      setTimeout(() => {
        const call = aiBid(S.hands[seat], S.bid.max);
        applyBid(seat, call);
      }, 650);
    }
  }
  function applyBid(seat, call) {
    if (call > S.bid.max) { S.bid.max = call; S.bid.leader = seat; setBubble(seat, '叫 ' + call + ' 分'); }
    else setBubble(seat, '不叫');
    S.bid.idx++;
    setTimeout(nextBid, 500);
  }
  function showBidUI() {
    const a = $('#ddzActions'); a.innerHTML = '';
    setStatus('轮到你叫地主');
    const opts = [['不叫', 0], ['1 分', 1], ['2 分', 2], ['3 分', 3]];
    for (const [t, v] of opts) {
      if (v !== 0 && v <= S.bid.max) continue;
      const b = document.createElement('button');
      b.className = 'abtn' + (v === 3 ? ' gold' : v ? ' primary' : '');
      b.textContent = t;
      b.onclick = () => { a.innerHTML = ''; applyBid(0, v); };
      a.appendChild(b);
    }
  }
  function finishBidding() {
    if (S.bid.max === 0) { setStatus('无人叫地主，重新发牌'); setTimeout(newGame, 1100); return; }
    const ll = S.bid.leader;
    S.landlord = ll; S.roles = [0, 1, 2].map(i => i === ll ? 'landlord' : 'farmer');
    S.hands[ll] = sortHand(S.hands[ll].concat(S.bottom));
    S.multiplier = S.bid.max; S.phase = 'play'; S.turn = ll;
    S.target = null; S.targetSeat = -1; S.passes = 0;
    renderAll();
    setStatus((ll === 0 ? '你' : NAMES[ll]) + ' 当地主，底分 ' + S.bid.max + '，出牌开始');
    setTimeout(() => step(), 700);
  }

  /* ---- 出牌循环 ---- */
  function step() {

function makeBlackjack() {
  let shoe, player, dealer, bank, bet, phase, area;
  function newShoe() { shoe = []; let id = 0; for (let d = 0; d < 6; d++) for (let s = 0; s < 4; s++) for (let r = 1; r <= 13; r++) shoe.push({ r, s, id: id++ }); shoe = shuffle(shoe); }
  function draw() { if (shoe.length < 20) newShoe(); return shoe.pop(); }
  function val(cards) {
    let sum = 0, aces = 0;
    for (const c of cards) { let v = c.r; if (v > 10) v = 10; if (c.r === 1) { aces++; v = 11; } sum += v; }
    while (sum > 21 && aces) { sum -= 10; aces--; }
    return sum;
  }
  function isBJ(cards) { return cards.length === 2 && val(cards) === 21; }
  function start() {
    if (bank <= 0) { bank = 1000; }
    bet = Math.min(bet || 100, bank);
    phase = 'player';
    player = [draw(), draw()]; dealer = [draw(), draw()];
    if (isBJ(player) || isBJ(dealer)) phase = 'reveal', settle();
    else render();
  }
  function hit() { if (phase !== 'player') return; player.push(draw()); if (val(player) > 21) { phase = 'reveal'; settle(); } else render(); }
  function stand() { if (phase !== 'player') return; phase = 'dealer'; dealerPlay(); }
  function double() { if (phase !== 'player' || player.length !== 2 || bank < bet * 2) return; bet *= 2; player.push(draw()); if (val(player) > 21) { phase = 'reveal'; settle(); } else { phase = 'dealer'; dealerPlay(); } }
  async function dealerPlay() { render(); while (val(dealer) < 17) { await sleep(550); dealer.push(draw()); render(); } await sleep(300); phase = 'reveal'; settle(); }
  function settle() {
    const p = val(player), d = val(dealer); let msg, delta = 0;
    const pBJ = isBJ(player), dBJ = isBJ(dealer);
    if (pBJ && dBJ) { msg = '双方黑杰克，平局'; }
    else if (pBJ) { delta = bet * 1.5; msg = '黑杰克！赢 ' + delta; }
    else if (dBJ) { delta = -bet; msg = '庄家黑杰克，输 ' + bet; }
    else if (p > 21) { delta = -bet; msg = '爆牌，输 ' + bet; }
    else if (d > 21) { delta = bet; msg = '庄家爆牌，赢 ' + bet; }
    else if (p > d) { delta = bet; msg = '你 ' + p + ' > 庄 ' + d + '，赢 ' + bet; }
    else if (p < d) { delta = -bet; msg = '你 ' + p + ' < 庄 ' + d + '，输 ' + bet; }
    else { msg = '平局 ' + p; }
    bank += delta; phase = 'over'; render(msg);
  }
  function render(msg) {
    const dShow = phase === 'player' || phase === 'dealer' && false; // 庄家第二张在玩家阶段隐藏
    const hideHole = phase === 'player';
    area.innerHTML = `
      <div class="bj-area">
        <div class="bj-row">
          <h3>庄家 ${hideHole ? '' : '· ' + val(dealer)}</h3>
          <div class="bj-cards" id="dCards"></div>
        </div>
        <div>
          <div class="bj-msg" id="bjMsg">${msg || ''}</div>
          <div class="bj-bank">余额 <b>${bank}</b> · 本注 <b>${bet}</b></div>
        </div>
        <div class="bj-row">
          <h3>你 · ${val(player)}</h3>
          <div class="bj-cards" id="pCards"></div>
          <div class="bj-actions" id="bjActions"></div>
        </div>
      </div>`;
    const dC = $('#dCards'), pC = $('#pCards');
    dealer.forEach((c, i) => dC.appendChild((hideHole && i === 1) ? cardFace({ faceUp: false }) : cardFace({ label: lbl(c.r), suit: c.s })));
    player.forEach(c => pC.appendChild(cardFace({ label: lbl(c.r), suit: c.s })));
    const a = $('#bjActions');
    const mk = (t, fn, dis) => { const b = document.createElement('button'); b.className = 'abtn'; b.textContent = t; b.disabled = !!dis; b.onclick = fn; b.style.padding = '10px 20px'; b.style.fontSize = '14px'; a.appendChild(b); };
    if (phase === 'player') { mk('要牌', hit); mk('停牌', stand); mk('加倍', double, player.length !== 2 || bank < bet * 2); }
    else if (phase === 'over' || phase === 'reveal') {
      const wrap = document.createElement('div'); wrap.className = 'bj-chips';
      [50, 100, 200, 500].forEach(v => { const b = document.createElement('button'); b.className = 'chipb'; b.textContent = v; b.style.background = { 50: '#3b7', 100: '#27c', 200: '#c33', 500: '#a3a' }[v]; b.disabled = v > bank; b.onclick = () => { bet = v; start(); }; wrap.appendChild(b); });
      a.appendChild(wrap);
      mk('再来（沿用本注 ' + Math.min(bet, bank) + '）', () => { bet = Math.min(bet, bank); start(); }, bank <= 0);
    }
  }
  function mount(root) {
    root.innerHTML = `<div class="bj" id="bjBoard"></div>`; area = $('#bjBoard');
    bank = 1000; bet = 100; newShoe();
    area.innerHTML = `<div class="bj-area"><div class="bj-row"><h3>21 点 · Blackjack</h3><p style="opacity:.85;font-size:13px;line-height:1.7">虚拟筹码（初始 1000）· 黑杰克 1.5 倍赔付 · 庄家 17 点停牌<br>选择下注金额开始</p></div><div class="bj-chips" id="startChips"></div></div>`;
    const sc = $('#startChips');
    [50, 100, 200, 500].forEach(v => { const b = document.createElement('button'); b.className = 'chipb'; b.textContent = v; b.style.background = { 50: '#3b7', 100: '#27c', 200: '#c33', 500: '#a3a' }[v]; b.onclick = () => { bet = v; start(); }; sc.appendChild(b); });
  }
  return { title: '21 点', emoji: '🂡', desc: '虚拟筹码 · 要牌 / 停牌 / 加倍 · 庄家 17 停', mount, unmount() { } };
}
registerGame('blackjack', makeBlackjack());

/* ============================ 启动 ============================ */
stripReaderInvert();
renderHome();
const initHash = location.hash.slice(1);
if (GAMES[initHash]) openGame(initHash);

// 调试钩子
window.__poker = { GAMES, open: openGame, home: goHome, get active() { return active; } };
</script>
</body>
</html>
