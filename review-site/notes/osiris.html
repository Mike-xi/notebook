<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSIRIS 全球情报大屏</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #05070d; color: #8aa3b0; }
    /* 兜底文案：放在 iframe 下层，正常情况下被地图盖住；iframe 加载失败时才透出来 */
    .fallback {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; text-align: center; padding: 24px;
      font: 14px/1.6 system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    }
    .fallback a { color: #00E5FF; }
    #osiris-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #05070d; }
  </style>
</head>
<body>
  <div class="fallback">
    <div>正在加载 OSIRIS 全球情报大屏…</div>
    <div>若长时间空白，<a href="https://osiris-five-delta.vercel.app" target="_blank" rel="noopener">点此在新标签页打开 ↗</a></div>
  </div>
  <iframe id="osiris-frame"
          src="https://osiris-five-delta.vercel.app"
          title="OSIRIS — 全球开源情报大屏"
          allow="fullscreen; geolocation"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
</body>
</html>
