<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻城一中 · Minecraft 漫游</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#87b9e8;
    font-family:"Microsoft YaHei","微软雅黑",sans-serif; -webkit-user-select:none; user-select:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  #crosshair { position:fixed; left:50%; top:50%; width:22px; height:22px; transform:translate(-50%,-50%);
    pointer-events:none; opacity:.85; z-index:5; }
  #crosshair::before,#crosshair::after{ content:""; position:absolute; background:#fff;
    box-shadow:0 0 2px rgba(0,0,0,.6); }
  #crosshair::before{ left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #crosshair::after { top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }

  #overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#1b2a44 0%,#24405f 60%,#3a6b8f 100%); color:#eef4ff; text-align:center; }
  #overlay .panel { max-width:600px; padding:34px 40px; }
  #overlay h1 { font-size:30px; letter-spacing:2px; margin-bottom:6px; text-shadow:2px 2px 0 #0006; }
  #overlay .sub { font-size:14px; opacity:.85; margin-bottom:20px; line-height:1.6; }
  #overlay .keys { display:grid; grid-template-columns:1fr 1fr; gap:8px 26px; font-size:14px;
    margin:0 auto 22px; max-width:460px; text-align:left; }
  #overlay .keys b{ display:inline-block; min-width:78px; color:#ffd76a; }
  #startBtn { font-size:18px; padding:13px 40px; border:none; border-radius:10px; cursor:pointer;
    background:#4caf50; color:#fff; box-shadow:0 4px 0 #357a38, 0 8px 18px #0007; transition:.12s; letter-spacing:3px; }
  #startBtn:hover{ background:#5cc15f; }
  #startBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #357a38; }
  #overlay .tip{ margin-top:14px; font-size:12px; opacity:.6; }

  #hud { position:fixed; left:12px; bottom:12px; z-index:5; color:#fff; font-size:12px; line-height:1.6;
    text-shadow:1px 1px 2px #000a; pointer-events:none; }
  #hud .loc{ color:#ffe08a; }
  #fps { position:fixed; right:12px; top:12px; z-index:5; color:#cfe; font-size:12px;
    text-shadow:1px 1px 2px #000a; pointer-events:none; }
  #minimap { position:fixed; right:12px; bottom:12px; z-index:5; border:2px solid #ffffffaa;
    border-radius:6px; background:#0007; image-rendering:pixelated; }
  #toast{ position:fixed; left:50%; top:18%; transform:translateX(-50%); z-index:6; color:#fff;
    background:#0008; padding:8px 18px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .3s;
    pointer-events:none; text-shadow:1px 1px 2px #000; }
  #backBtn{ position:fixed; left:12px; top:12px; z-index:8; color:#fff; text-decoration:none;
    background:#0007; padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600;
    backdrop-filter:blur(4px); border:1px solid #ffffff33; }
  #backBtn:hover{ background:#000a; }
  #tpbar{ position:fixed; left:50%; bottom:12px; transform:translateX(-50%); z-index:7; display:flex; gap:6px;
    flex-wrap:wrap; justify-content:center; max-width:60vw; pointer-events:auto; }
  #tpbar button{ font-size:12px; padding:5px 10px; border-radius:7px; border:1px solid #ffffff33; cursor:pointer;
    background:#0008; color:#fff; backdrop-filter:blur(3px); }
  #tpbar button:hover{ background:#1c8f3e; }
</style>
</head>
<body>
<div id="app"></div>
<div id="crosshair"></div>
<a id="backBtn" href="/">‹ 返回复习站</a>

<div id="hud">
  <div>📍 <span class="loc" id="loc">—</span></div>
  <div id="modeline">🚶 步行模式</div>
</div>
<div id="fps">FPS —</div>
<canvas id="minimap" width="200" height="200"></canvas>
<div id="toast"></div>
<div id="tpbar"></div>

<div id="overlay">
  <div class="panel">
    <h1>麻 城 一 中</h1>
    <div class="sub">Minecraft 风格 · 第一人称校园漫游<br>按新校区（河东滨江新区）卫星图与实拍照片复刻</div>
    <div class="keys">
      <div><b>W A S D</b> 移动</div>
      <div><b>鼠标</b> 转视角</div>
      <div><b>Shift</b> 疾跑</div>
      <div><b>空格</b> 跳跃 / 飞行上升</div>
      <div><b>F</b> 切换飞行</div>
      <div><b>Ctrl</b> 飞行下降</div>
      <div><b>1~8</b> 快速传送</div>
      <div><b>Esc</b> 释放鼠标</div>
    </div>
    <button id="startBtn">点击进入校园</button>
    <div class="tip">提示：进入后鼠标会被锁定，按 Esc 退出锁定。建议全屏（F11）+ 开启飞行（F）俯瞰全校。</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>if (typeof THREE === 'undefined') document.write('<scr'+'ipt src="https://unpkg.com/three@0.160.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script>
(function(){
'use strict';
if (typeof THREE === 'undefined'){
  document.getElementById('overlay').innerHTML =
    '<div style="margin:auto;color:#fff;text-align:center;font-size:18px">3D 引擎加载失败<br>请检查网络后刷新</div>';
  return;
}
// 嵌入复习站时剥离阅读器反相
(function(){ const strip=()=>document.documentElement.classList.remove('nb-dark-invert');
  strip(); try{ new MutationObserver(strip).observe(document.documentElement,{attributes:true,attributeFilter:['class']}); }catch(e){} })();

// ===================== 基础常量 =====================
const FLOOR_H = 3.6;          // 每层楼高
const EYE = 1.7;
const PLAYER_R = 1.3;
const TEST = new URLSearchParams(location.search).has('test');

// ===================== 渲染器 / 场景 / 相机 =====================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fc1ee);
scene.fog = new THREE.Fog(0x9fc8ee, 300, 900);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 2000);

scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x6b7a55, 0.95));
const sun = new THREE.DirectionalLight(0xfff2d6, 1.05);
sun.position.set(180, 320, 140);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.24));

// ===================== 程序化像素贴图 =====================
function tex(size, draw, rx=1, ry=1){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d'); draw(g,size);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter; t.minFilter=THREE.NearestFilter;
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.colorSpace=THREE.SRGBColorSpace; t.repeat.set(rx,ry);
  return t;
}
// 矩形画布贴图（运动场/篮球阵列等需要非正方形比例）
function texRect(w,h, draw, smooth=true){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d'); draw(g,w,h);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=t.minFilter=smooth?THREE.LinearFilter:THREE.NearestFilter;
  t.colorSpace=THREE.SRGBColorSpace; return t;
}
function rnd(g,size,base,specks){ g.fillStyle=base; g.fillRect(0,0,size,size);
  for(const [col,n] of specks){ g.fillStyle=col; for(let i=0;i<n;i++){ g.fillRect((Math.random()*size)|0,(Math.random()*size)|0,1,1);} } }
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,gg=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));gg=Math.max(0,Math.min(255,gg));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(gg<<8)+b).toString(16).slice(1); }

const grassTex = tex(16,(g,s)=>rnd(g,s,'#5d9440',[['#6ea84c',26],['#4f8235',26],['#7cb858',10]]));
const paveTex  = tex(32,(g,s)=>{ rnd(g,s,'#cdc8bb',[['#bdb7a9',60],['#dcd7ca',40]]);
  g.strokeStyle='#a8a293'; g.lineWidth=1; for(let i=0;i<=s;i+=8){g.beginPath();g.moveTo(i,0);g.lineTo(i,s);g.moveTo(0,i);g.lineTo(s,i);g.stroke();} });
const roadTex  = tex(16,(g,s)=>rnd(g,s,'#3b3d44',[['#34363d',40],['#45474f',24]]));
const roofTex  = tex(16,(g,s)=>{ rnd(g,s,'#7a3328',[['#8a3a2d',26],['#642a20',26]]);
  g.strokeStyle='#522017';g.lineWidth=1; for(let i=0;i<=s;i+=4){g.beginPath();g.moveTo(0,i);g.lineTo(s,i);g.stroke();} });
const greyRoofTex = tex(16,(g,s)=>rnd(g,s,'#8c8e94',[['#7c7e84',30],['#9ca0a6',26]]));

// 一格"楼层"立面：墙 + 窗 + 楼板带
function facadeCell(g,s,wallCol,bandCol,frameCol){
  rnd(g,s,wallCol,[[shade(wallCol,12),50],[shade(wallCol,-12),50]]);
  g.strokeStyle=shade(wallCol,-22); g.globalAlpha=.5;
  for(let y=4;y<s;y+=4){ g.beginPath(); g.moveTo(0,y); g.lineTo(s,y); g.stroke(); } g.globalAlpha=1;
  g.fillStyle=bandCol; g.fillRect(0,s-4,s,4);
  const wx=6,wy=6,ww=s-12,wh=s-16;
  g.fillStyle=frameCol; g.fillRect(wx-1,wy-1,ww+2,wh+2);
  const grd=g.createLinearGradient(0,wy,0,wy+wh);
  grd.addColorStop(0,'#9fc0d8'); grd.addColorStop(.5,'#6f90ad'); grd.addColorStop(1,'#86a6c0');
  g.fillStyle=grd; g.fillRect(wx,wy,ww,wh);
  g.fillStyle=frameCol; g.fillRect(wx+ww/2-1,wy,2,wh); g.fillRect(wx,wy+wh/2-1,ww,2);
}
const brickFacade = tex(32,(g,s)=>facadeCell(g,s,'#b1493b','#ece5d6','#efe9dc')); // 红砖教学楼
const whiteFacade = tex(32,(g,s)=>facadeCell(g,s,'#dcd6c8','#bfb9aa','#f3f0e8')); // 白色公共楼
const dormFacade  = tex(32,(g,s)=>{ facadeCell(g,s,'#cdbb9c','#a8987a','#efe9dc');
  g.fillStyle='#8d7d62'; g.fillRect(4,s-7,s-8,2); for(let x=6;x<s-4;x+=3) g.fillRect(x,s-7,1,3); }); // 米色宿舍

// 运动场（标准 400m：红跑道 + 绿茵足球场，画在 200x380 竖向画布）
const fieldTex = texRect(220,400,(g,W,H)=>{
  g.fillStyle='#3f8a39'; g.fillRect(0,0,W,H);
  const rr=(x,y,w,h,r,col,stroke)=>{ g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
    if(col){g.fillStyle=col;g.fill();} if(stroke){g.strokeStyle=stroke;g.stroke();} };
  rr(14,20,W-28,H-40,95,'#b5483a');                         // 红色跑道
  g.lineWidth=1.4; g.strokeStyle='#f0ece2'; g.globalAlpha=.85;
  for(let k=1;k<8;k++){ const o=k*5; rr(14+o,20+o,W-28-o*2,H-40-o*2,Math.max(8,95-o),null,'#f0ece2'); }
  g.globalAlpha=1;
  rr(34,86,W-68,H-172,4,'#3f9a39');                          // 内场草
  g.strokeStyle='#f3efe6'; g.lineWidth=2.4; g.strokeRect(40,92,W-80,H-184);
  g.beginPath(); g.moveTo(40,H/2); g.lineTo(W-40,H/2); g.stroke();
  g.beginPath(); g.arc(W/2,H/2,26,0,Math.PI*2); g.stroke();
  g.strokeRect(W/2-44,92,88,40); g.strokeRect(W/2-44,H-132,88,40);   // 禁区
});
// 篮球场阵列（3 行 × 6 列）画在长方形画布
const courtsTex = texRect(384,200,(g,W,H)=>{
  g.fillStyle='#a23c30'; g.fillRect(0,0,W,H);             // 场间红色塑胶
  const cols=6,rows=3, pad=8, cw=(W-pad)/cols-pad, ch=(H-pad)/rows-pad;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const x=pad+c*(cw+pad), y=pad+r*(ch+pad);
    g.fillStyle='#2f7d56'; g.fillRect(x,y,cw,ch);          // 绿色球场
    g.strokeStyle='#f2efe6'; g.lineWidth=1.6; g.strokeRect(x+3,y+3,cw-6,ch-6);
    g.beginPath(); g.moveTo(x+cw/2,y+3); g.lineTo(x+cw/2,y+ch-3); g.stroke();
    g.beginPath(); g.arc(x+cw/2,y+ch/2,8,0,Math.PI*2); g.stroke();
  }
});
// 网球场阵列（更细）
const tennisTex = texRect(384,160,(g,W,H)=>{
  g.fillStyle='#9a3a30'; g.fillRect(0,0,W,H);
  const cols=6,rows=2,pad=7,cw=(W-pad)/cols-pad,ch=(H-pad)/rows-pad;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){ const x=pad+c*(cw+pad),y=pad+r*(ch+pad);
    g.fillStyle='#2d6f8a'; g.fillRect(x,y,cw,ch);
    g.strokeStyle='#f2efe6'; g.lineWidth=1.4; g.strokeRect(x+4,y+4,cw-8,ch-8);
    g.beginPath(); g.moveTo(x+cw/2,y+4); g.lineTo(x+cw/2,y+ch-4); g.stroke(); }
});

// ===================== 材质 =====================
const mat = (t,opts={})=> new THREE.MeshLambertMaterial({ map:t, ...opts });
function facadeMat(baseTex, wCells, floors){
  const t=baseTex.clone(); t.needsUpdate=true; t.repeat.set(Math.max(1,Math.round(wCells)), floors);
  return new THREE.MeshLambertMaterial({ map:t });
}

// ===================== 世界 / 碰撞 / 地图 =====================
const world = new THREE.Group(); scene.add(world);
const colliders=[]; const mapShapes=[]; const labels=[]; const teleports={};
function addCollider(x,z,w,d){ colliders.push({minx:x-w/2,maxx:x+w/2,minz:z-d/2,maxz:z+d/2}); }

function plane(tx,w,d,x,z,y=0.02,rep=null){
  const t=(rep?tx.clone():tx); if(rep){ t.needsUpdate=true; t.repeat.set(rep[0],rep[1]); }
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d), new THREE.MeshLambertMaterial({map:t}));
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z); world.add(m); return m;
}
function planeMat(material,w,d,x,z,y=0.05){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),material); m.rotation.x=-Math.PI/2; m.position.set(x,y,z); world.add(m); return m;
}

function makeLabel(text,x,y,z,color='#fff'){
  const c=document.createElement('canvas'); c.width=256; c.height=64; const g=c.getContext('2d');
  g.fillStyle='rgba(0,0,0,.55)'; roundRect(g,0,0,256,64,12); g.fill();
  g.font='bold 32px "Microsoft YaHei"'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle=color; g.fillText(text,128,34);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:true,transparent:true}));
  sp.position.set(x,y,z); sp.scale.set(26,6.5,1); world.add(sp); labels.push(sp); return sp;
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

// ===================== 基础楼栋（4 面立面 + 屋顶 + 勒脚） =====================
function building({x,z,w,d,floors,facade=brickFacade,roof=roofTex,label,labelColor='#fff',mapColor='#c0564a',collide=true,baseCol=0xb9b2a2}){
  const h=floors*FLOOR_H;
  const g=new THREE.Group(); g.position.set(x,0,z);
  const CELL=5;
  const mW=facadeMat(facade,w/CELL,floors), mD=facadeMat(facade,d/CELL,floors);
  mW.side=mD.side=THREE.DoubleSide;
  const pw=new THREE.PlaneGeometry(w,h), pd=new THREE.PlaneGeometry(d,h);
  const mk=(geo,mt,px,py,pz,ry)=>{ const m=new THREE.Mesh(geo,mt); m.position.set(px,py,pz); m.rotation.y=ry; g.add(m); };
  mk(pw,mW,0,h/2,d/2,0); mk(pw,mW,0,h/2,-d/2,Math.PI);
  mk(pd,mD,w/2,h/2,0,Math.PI/2); mk(pd,mD,-w/2,h/2,0,-Math.PI/2);
  const roofMesh=new THREE.Mesh(new THREE.BoxGeometry(w+1,1.3,d+1), mat(roof)); roofMesh.position.y=h+0.3; g.add(roofMesh);
  const base=new THREE.Mesh(new THREE.BoxGeometry(w+0.6,2,d+0.6), new THREE.MeshLambertMaterial({color:baseCol})); base.position.y=1; g.add(base);
  world.add(g);
  if(collide) addCollider(x,z,w,d);
  mapShapes.push({x,z,w,d,c:mapColor});
  if(label) makeLabel(label,x,h+6,z,labelColor);
  return {x,z,w,d,h};
}

// ===================== 梳齿/E形楼（长脊 + 多翼，围合庭院） =====================
// dir: 翼楼伸出方向，+1 向南(+z)，-1 向北(-z)
function combBuilding({x,z,spineLen,spineD=13,wingLen=34,wingD=12,nWings=4,floors=5,
                       facade=brickFacade,dir=1,label,labelColor='#fff',mapColor='#c0564a'}){
  building({x,z,w:spineLen,d:spineD,floors,facade,mapColor,collide:true});
  const span=spineLen-wingD-6, startX=x-span/2;
  for(let i=0;i<nWings;i++){
    const wx=startX + (nWings>1? span*i/(nWings-1):0);
    const wz=z + dir*(spineD/2 + wingLen/2 - 0.5);
    building({x:wx,z:wz,w:wingD,d:wingLen,floors,facade,mapColor,collide:true});
  }
  // 端部连廊（封口的一翼），让外轮廓更像实物
  if(label) makeLabel(label, x, floors*FLOOR_H+6, z, labelColor);
}

// ===================== 连廊（二层拱门走廊，对应实拍） =====================
function corridor(x1,z1,x2,z2){
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz),ang=Math.atan2(dx,dz);
  const g=new THREE.Group(); g.position.set((x1+x2)/2,0,(z1+z2)/2); g.rotation.y=ang;
  const body=new THREE.Mesh(new THREE.BoxGeometry(5,3.4,len), facadeMat(brickFacade,2,1));
  body.position.y=FLOOR_H*2+1.7; g.add(body);
  const pillarMat=new THREE.MeshLambertMaterial({color:0xe2dccd});
  const n=Math.max(2,Math.round(len/9));
  for(let i=0;i<=n;i++){ const p=new THREE.Mesh(new THREE.BoxGeometry(1.4,FLOOR_H*2,1.4),pillarMat);
    p.position.set(0,FLOOR_H,-len/2+i*(len/n)); g.add(p); }
  world.add(g);
}

// ===================== 体育馆（红砖基座 + 浅色拱顶） =====================
function gymHall(x,z,w,d,name){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const baseH=10;
  // 基座（红砖立面 box，用 building 风格但单体）
  const bm=facadeMat(whiteFacade, w/6, 2); bm.side=THREE.DoubleSide;
  const pw=new THREE.PlaneGeometry(w,baseH), pd=new THREE.PlaneGeometry(d,baseH);
  const mk=(geo,px,py,pz,ry)=>{ const m=new THREE.Mesh(geo,bm); m.position.set(px,py,pz); m.rotation.y=ry; g.add(m); };
  mk(pw,0,baseH/2,d/2,0); mk(pw,0,baseH/2,-d/2,Math.PI); mk(pd,w/2,baseH/2,0,Math.PI/2); mk(pd,-w/2,baseH/2,0,-Math.PI/2);
  // 红砖勒脚
  const skirt=new THREE.Mesh(new THREE.BoxGeometry(w+0.6,3,d+0.6), new THREE.MeshLambertMaterial({color:0x9a4034})); skirt.position.y=1.5; g.add(skirt);
  // 拱顶（半圆柱沿 d 方向）
  const roof=new THREE.Mesh(new THREE.CylinderGeometry(d/2*0.92,d/2*0.92,w,18,1,false,0,Math.PI),
    new THREE.MeshLambertMaterial({color:0xeef0f2,flatShading:true}));
  roof.rotation.z=Math.PI/2; roof.position.y=baseH; g.add(roof);
  // 顶脊
  const ridge=new THREE.Mesh(new THREE.BoxGeometry(w,0.8,1.2), new THREE.MeshLambertMaterial({color:0xc9ccd0}));

// ===================== 篮球架（实例化简化） =====================
function hoops(x0,z0,cols,rows,dx,dz){
  const poleGeo=new THREE.BoxGeometry(0.35,4,0.35), boardGeo=new THREE.BoxGeometry(2,1.2,0.2);
  const poleMat=new THREE.MeshLambertMaterial({color:0x556069}), boardMat=new THREE.MeshLambertMaterial({color:0xf2f2f2});
  const n=cols*rows*2;
  const pole=new THREE.InstancedMesh(poleGeo,poleMat,n), board=new THREE.InstancedMesh(boardGeo,boardMat,n);
  const m=new THREE.Matrix4(); let k=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){ const cx=x0+c*dx, cz=z0+r*dz;
    for(const s of [-1,1]){ const px=cx, pz=cz+s*(dz*0.42);
      m.makeTranslation(px,2,pz); pole.setMatrixAt(k,m);
      m.makeTranslation(px,4.2,pz - s*0.4); board.setMatrixAt(k,m); k++; } }
  pole.count=k; board.count=k; world.add(pole); world.add(board);
}

const treePos=[], lampPos=[], gardenLampPos=[];
function buildTrees(){
  if(!treePos.length) return;
  const trunkGeo=new THREE.BoxGeometry(1.1,5,1.1), leafGeo=new THREE.BoxGeometry(5,5,5);
  const trunkMat=new THREE.MeshLambertMaterial({color:0x6b4a2b}), leafMat=new THREE.MeshLambertMaterial({color:0x3f8f3a});
  const trunk=new THREE.InstancedMesh(trunkGeo,trunkMat,treePos.length), leaf=new THREE.InstancedMesh(leafGeo,leafMat,treePos.length*2);
  const m=new THREE.Matrix4(); let li=0;
  treePos.forEach((p,i)=>{ m.makeTranslation(p.x,2.5,p.z); trunk.setMatrixAt(i,m);
    m.makeTranslation(p.x,6.5,p.z); leaf.setMatrixAt(li++,m);
    m.compose(new THREE.Vector3(p.x,9.3,p.z),new THREE.Quaternion(),new THREE.Vector3(0.7,0.7,0.7)); leaf.setMatrixAt(li++,m); });
  world.add(trunk); world.add(leaf);
}
function buildLamps(){

  const o=controls.getObject().position;
  const sprint=keys['ShiftLeft']||keys['ShiftRight'];
  const speed=(fly?48:(sprint?36:16));
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();

  tmp.set(0,0,0); tmp.addScaledVector(fwd,mz).addScaledVector(right,mx); if(tmp.lengthSq()>0) tmp.normalize();
  const dx=tmp.x*speed*dt, dz=tmp.z*speed*dt;
  if(!collide(o.x+dx,o.z)) o.x+=dx;
  if(!collide(o.x,o.z+dz)) o.z+=dz;
  if(fly){ if(keys['Space']) o.y+=speed*dt; if(keys['ControlLeft']||keys['ControlRight']) o.y-=speed*dt; o.y=Math.max(EYE,o.y); }
  else { if(keys['Space']&&Math.abs(o.y-EYE)<0.05) vy=9.5; vy-=26*dt; o.y+=vy*dt; if(o.y<EYE){o.y=EYE;vy=0;} }
  o.x=Math.max(X0+3,Math.min(X1-3,o.x)); o.z=Math.max(ZN+3,Math.min(ZS+3,o.z));
}

// ===================== 小地图 =====================
const mm=document.getElementById('minimap'), mg=mm.getContext('2d');
const MM=200, MAP_MIN=-250, MAP_MAX=250, MAP_SPAN=MAP_MAX-MAP_MIN;
function w2m(v){ return (v-MAP_MIN)/MAP_SPAN*MM; }
function drawMinimap(){
  mg.clearRect(0,0,MM,MM); mg.fillStyle='#3d6b34'; mg.fillRect(0,0,MM,MM);
  for(const s of mapShapes){ mg.fillStyle=s.c;
    mg.fillRect(w2m(s.x-s.w/2),w2m(s.z-s.d/2),Math.max(2,s.w/MAP_SPAN*MM),Math.max(2,s.d/MAP_SPAN*MM)); }
  const o=controls.getObject().position; const px=w2m(o.x),pz=w2m(o.z); camera.getWorldDirection(fwd);
  mg.strokeStyle='#fff'; mg.lineWidth=2; mg.beginPath(); mg.moveTo(px,pz); mg.lineTo(px+fwd.x*12,pz+fwd.z*12); mg.stroke();
  mg.fillStyle='#ff3b3b'; mg.beginPath(); mg.arc(px,pz,3.5,0,Math.PI*2); mg.fill();
}

// ===================== Toast / HUD / 主循环 =====================
const toastEl=document.getElementById('toast'); let toastT;
function toast(t){ toastEl.textContent=t; toastEl.style.opacity=1; clearTimeout(toastT); toastT=setTimeout(()=>toastEl.style.opacity=0,1200); }
const locEl=document.getElementById('loc'), fpsEl=document.getElementById('fps');
let fpsFrames=0,fpsTime=0;
const clock=new THREE.Clock();
function animate(){ requestAnimationFrame(animate);
  const dt=Math.min(0.05,clock.getDelta());
  if(controls.isLocked) update(dt);
  clouds.position.x=(clock.elapsedTime*2)%240-120;
  const o=controls.getObject().position;
  locEl.textContent=`x ${o.x.toFixed(0)}  z ${o.z.toFixed(0)}  y ${o.y.toFixed(0)}`;
  drawMinimap();
  fpsFrames++; fpsTime+=dt; if(fpsTime>0.5){ fpsEl.textContent='FPS '+Math.round(fpsFrames/fpsTime); fpsFrames=0; fpsTime=0; }
  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// ===================== 调试钩子 =====================
window.__mc={ scene,camera,controls,colliders,mapShapes,teleports,
  go(name){ const p=teleports[name]; if(p) controls.getObject().position.set(p.x,p.y,p.z); } };
if(TEST){ console.log('[test] mc ready. teleports:',Object.keys(teleports),'colliders:',colliders.length,'mapShapes:',mapShapes.length); }
})();
