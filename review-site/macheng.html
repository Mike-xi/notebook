<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻城一中 · Minecraft 漫游</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#87b9e8;
    font-family:"Microsoft YaHei","微软雅黑",sans-serif; -webkit-user-select:none; user-select:none; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* 准星 */
  #crosshair { position:fixed; left:50%; top:50%; width:22px; height:22px; transform:translate(-50%,-50%);
    pointer-events:none; opacity:.85; z-index:5; }
  #crosshair::before,#crosshair::after{ content:""; position:absolute; background:#fff;
    box-shadow:0 0 2px rgba(0,0,0,.6); }
  #crosshair::before{ left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #crosshair::after { top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }

  /* 开始遮罩 */
  #overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#1b2a44 0%,#24405f 60%,#3a6b8f 100%); color:#eef4ff; text-align:center; }
  #overlay .panel { max-width:560px; padding:34px 40px; }
  #overlay h1 { font-size:30px; letter-spacing:2px; margin-bottom:6px;
    text-shadow:2px 2px 0 #0006; }
  #overlay .sub { font-size:14px; opacity:.8; margin-bottom:22px; }
  #overlay .keys { display:grid; grid-template-columns:1fr 1fr; gap:8px 26px; font-size:14px;
    margin:0 auto 26px; max-width:430px; text-align:left; }
  #overlay .keys b{ display:inline-block; min-width:74px; color:#ffd76a; }
  #startBtn { font-size:18px; padding:13px 40px; border:none; border-radius:10px; cursor:pointer;
    background:#4caf50; color:#fff; box-shadow:0 4px 0 #357a38, 0 8px 18px #0007; transition:.12s; letter-spacing:3px; }
  #startBtn:hover{ background:#5cc15f; }
  #startBtn:active{ transform:translateY(3px); box-shadow:0 1px 0 #357a38; }
  #overlay .tip{ margin-top:16px; font-size:12px; opacity:.6; }

  /* HUD */
  #hud { position:fixed; left:12px; bottom:12px; z-index:5; color:#fff; font-size:12px; line-height:1.6;
    text-shadow:1px 1px 2px #000a; pointer-events:none; }
  #hud .loc{ color:#ffe08a; }
  #fps { position:fixed; right:12px; top:12px; z-index:5; color:#cfe; font-size:12px;
    text-shadow:1px 1px 2px #000a; pointer-events:none; }
  #minimap { position:fixed; right:12px; bottom:12px; z-index:5; border:2px solid #ffffffaa;
    border-radius:6px; background:#0007; image-rendering:pixelated; }
  #toast{ position:fixed; left:50%; top:18%; transform:translateX(-50%); z-index:6; color:#fff;
    background:#0008; padding:8px 18px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .3s;
    pointer-events:none; text-shadow:1px 1px 2px #000; }
  #backBtn{ position:fixed; left:12px; top:12px; z-index:8; color:#fff; text-decoration:none;
    background:#0007; padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600;
    backdrop-filter:blur(4px); border:1px solid #ffffff33; }
  #backBtn:hover{ background:#000a; }
</style>
</head>
<body>
<div id="app"></div>
<div id="crosshair"></div>
<a id="backBtn" href="/">‹ 返回复习站</a>

<div id="hud">
  <div>📍 <span class="loc" id="loc">—</span></div>
  <div id="modeline">🚶 步行模式</div>
</div>
<div id="fps">FPS —</div>
<canvas id="minimap" width="190" height="190"></canvas>
<div id="toast"></div>

<div id="overlay">
  <div class="panel">
    <h1>麻 城 一 中</h1>
    <div class="sub">Minecraft 风格 · 第一人称校园漫游（按大致比例复刻）</div>
    <div class="keys">
      <div><b>W A S D</b> 移动</div>
      <div><b>鼠标</b> 转视角</div>
      <div><b>Shift</b> 疾跑</div>
      <div><b>空格</b> 跳跃 / 飞行上升</div>
      <div><b>F</b> 切换飞行</div>
      <div><b>Ctrl</b> 飞行下降</div>
      <div><b>1~6</b> 快速传送</div>
      <div><b>Esc</b> 释放鼠标</div>
    </div>
    <button id="startBtn">点击进入校园</button>
    <div class="tip">提示：进入后鼠标会被锁定，按 Esc 退出锁定。建议全屏（F11）体验。</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>if (typeof THREE === 'undefined') document.write('<scr'+'ipt src="https://unpkg.com/three@0.160.0/build/three.min.js"><\/scr'+'ipt>');</script>
<script>
(function(){
'use strict';
if (typeof THREE === 'undefined'){
  document.getElementById('overlay').innerHTML =
    '<div style="margin:auto;color:#fff;text-align:center;font-size:18px">3D 引擎加载失败<br>请检查网络后刷新</div>';
  return;
}
// 跟随站点主题 + 剥离阅读器整体反相（嵌入复习站时生效，独立打开无害）
(function(){ const strip=()=>document.documentElement.classList.remove('nb-dark-invert');
  strip(); try{ new MutationObserver(strip).observe(document.documentElement,{attributes:true,attributeFilter:['class']}); }catch(e){} })();

// ===================== 基础常量 =====================
const FLOOR_H = 4;            // 每层楼高（方块感）
const EYE = 1.7;             // 眼睛高度
const PLAYER_R = 1.4;        // 玩家半径（碰撞）
const TEST = new URLSearchParams(location.search).has('test');

// ===================== 渲染器 / 场景 / 相机 =====================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fc1ee);
scene.fog = new THREE.Fog(0x9fc8ee, 220, 620);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 1500);

// 光照（Lambert 面着色 = 方块感）
scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x6b7a55, 0.95));
const sun = new THREE.DirectionalLight(0xfff2d6, 1.05);
sun.position.set(140, 260, 90);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.22));

// ===================== 贴图工具（程序化像素贴图） =====================
function tex(size, draw, rx=1, ry=1){
  const c = document.createElement('canvas'); c.width=c.height=size;
  const g = c.getContext('2d'); draw(g, size);
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.colorSpace = THREE.SRGBColorSpace;
  t.repeat.set(rx, ry);
  return t;
}
function rnd(g,size,base,specks){
  g.fillStyle=base; g.fillRect(0,0,size,size);
  for(const [col,n] of specks){ g.fillStyle=col;
    for(let i=0;i<n;i++){ g.fillRect((Math.random()*size)|0,(Math.random()*size)|0,1,1); } }
}

// 草地
const grassTex = tex(16,(g,s)=>rnd(g,s,'#5d9440',[['#6ea84c',26],['#4f8235',26],['#7cb858',10]]));
// 泥土小路 / 砖铺
const paveTex  = tex(32,(g,s)=>{ rnd(g,s,'#c4bfb2',[['#b7b1a3',60],['#d2cdc0',40]]);
  g.strokeStyle='#9d978a'; g.lineWidth=1; for(let i=0;i<=s;i+=8){g.beginPath();g.moveTo(i,0);g.lineTo(i,s);g.moveTo(0,i);g.lineTo(s,i);g.stroke();} });
// 沥青路
const roadTex  = tex(16,(g,s)=>rnd(g,s,'#3b3d44',[['#34363d',40],['#45474f',24]]));
// 屋顶
const roofTex  = tex(16,(g,s)=>{ rnd(g,s,'#6e2f25',[['#7d362a',26],['#5d271e',26]]);
  g.strokeStyle='#4f211a';g.lineWidth=1; for(let i=0;i<=s;i+=4){g.beginPath();g.moveTo(0,i);g.lineTo(s,i);g.stroke();} });

// 通用：在一个 cell 里画一面"楼层"（砖 + 一扇窗 + 楼板线）
function facadeCell(g,s,wallCol,bandCol,frameCol){
  // 墙底
  rnd(g,s,wallCol,[[shade(wallCol,12),50],[shade(wallCol,-12),50]]);
  // 砖缝（仅红砖时明显）
  g.strokeStyle=shade(wallCol,-22); g.globalAlpha=.5;
  for(let y=4;y<s;y+=4){ g.beginPath(); g.moveTo(0,y); g.lineTo(s,y); g.stroke(); }
  g.globalAlpha=1;
  // 楼板带（cell 底部）
  g.fillStyle=bandCol; g.fillRect(0,s-4,s,4);
  // 窗
  const wx=6, wy=6, ww=s-12, wh=s-16;
  g.fillStyle=frameCol; g.fillRect(wx-1,wy-1,ww+2,wh+2);       // 窗框
  const grd=g.createLinearGradient(0,wy,0,wy+wh);
  grd.addColorStop(0,'#9fc0d8'); grd.addColorStop(.5,'#6f90ad'); grd.addColorStop(1,'#86a6c0');
  g.fillStyle=grd; g.fillRect(wx,wy,ww,wh);                     // 玻璃
  g.fillStyle=frameCol; g.fillRect(wx+ww/2-1,wy,2,wh);          // 竖框
  g.fillRect(wx,wy+wh/2-1,ww,2);                                // 横框
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,gg=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));gg=Math.max(0,Math.min(255,gg));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(gg<<8)+b).toString(16).slice(1);
}
const brickFacade = tex(32,(g,s)=>facadeCell(g,s,'#b1493b','#e9e2d2','#efe9dc')); // 红砖教学楼
const whiteFacade = tex(32,(g,s)=>facadeCell(g,s,'#d6d0c2','#b9b3a4','#f2efe7')); // 白色综合楼/食堂
const dormFacade  = tex(32,(g,s)=>{ facadeCell(g,s,'#cdbb9c','#a8987a','#efe9dc');
  // 阳台栏杆
  g.fillStyle='#8d7d62'; g.fillRect(4,s-7,s-8,2);
  for(let x=6;x<s-4;x+=3) g.fillRect(x,s-7,1,3); });

// 运动场（俯视烘焙到一张贴图）
const fieldTex = tex(256,(g,s)=>{
  g.fillStyle='#3f7d39'; g.fillRect(0,0,s,s);                       // 外围草
  // 红色塑胶跑道（圆角矩形环）
  const rr=(x,y,w,h,r,col)=>{ g.fillStyle=col; g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); g.fill(); };
  rr(14,40,228,176,80,'#b5483a');                                  // 跑道红
  // 白色分道线
  g.strokeStyle='#f3efe6'; g.lineWidth=1; g.globalAlpha=.85;
  for(let k=0;k<6;k++){ const o=8+k*6;
    g.beginPath();
    const x=14+o,y=40+o,w=228-o*2,h=176-o*2,r=Math.max(8,80-o);
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); g.stroke(); }
  g.globalAlpha=1;
  rr(58,74,140,108,2,'#3f8a39');                                   // 内场绿
  // 足球场白线
  g.strokeStyle='#f3efe6'; g.lineWidth=2; g.strokeRect(62,78,132,100);
  g.beginPath(); g.moveTo(128,78); g.lineTo(128,178); g.stroke();
  g.beginPath(); g.arc(128,128,16,0,Math.PI*2); g.stroke();
}, 1, 1);
fieldTex.magFilter=THREE.LinearFilter;

// 篮球场贴图
const courtTex = tex(128,(g,s)=>{
  g.fillStyle='#2e6f4e'; g.fillRect(0,0,s,s);
  g.fillStyle='#3f7d39'; g.fillRect(0,0,s,s);
  g.fillStyle='#c98a3a'; g.fillRect(8,18,112,92);                  // 场地
  g.strokeStyle='#fff'; g.lineWidth=2; g.strokeRect(8,18,112,92);
  g.beginPath(); g.moveTo(64,18); g.lineTo(64,110); g.stroke();
  g.beginPath(); g.arc(64,64,16,0,Math.PI*2); g.stroke();
}, 1, 1);
courtTex.magFilter=THREE.LinearFilter;

// ===================== 材质缓存 =====================
const mat = (t,opts={})=> new THREE.MeshLambertMaterial({ map:t, ...opts });
function facadeMat(baseTex, wCells, floors){
  const t = baseTex.clone(); t.needsUpdate=true; t.repeat.set(Math.max(1,Math.round(wCells)), floors);
  return new THREE.MeshLambertMaterial({ map:t });
}

// ===================== 世界容器 / 碰撞 / 地图数据 =====================
const world = new THREE.Group(); scene.add(world);
const colliders = [];   // {minx,maxx,minz,maxz}
const mapShapes = [];   // 小地图: {x,z,w,d,c}
const labels = [];      // 文字标牌
const teleports = {};   // 传送点

function addCollider(x,z,w,d){ colliders.push({minx:x-w/2,maxx:x+w/2,minz:z-d/2,maxz:z+d/2}); }

// 地面 plane（顶面朝上）
function plane(tx,w,d,x,z,y=0.02,rep=null){
  const t = (rep? tx.clone():tx); if(rep){ t.needsUpdate=true; t.repeat.set(rep[0],rep[1]); }
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d), new THREE.MeshLambertMaterial({map:t}));
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z); world.add(m); return m;
}

// 文字标牌（精灵）
function makeLabel(text, x, y, z, color='#fff'){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const g=c.getContext('2d');
  g.fillStyle='rgba(0,0,0,.55)'; roundRect(g,0,0,256,64,12); g.fill();
  g.font='bold 34px "Microsoft YaHei"'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle=color; g.fillText(text,128,34);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:true,transparent:true}));
  sp.position.set(x,y,z); sp.scale.set(26,6.5,1); world.add(sp); labels.push(sp); return sp;
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

// ===================== 建筑：多层楼（4 面墙 + 屋顶） =====================
function building({x, z, w, d, floors, facade=brickFacade, roof=roofTex, label, labelColor='#fff', mapColor='#c0564a', collide=true}){
  const h = floors*FLOOR_H;
  const g = new THREE.Group(); g.position.set(x,0,z);
  const CELL = 5;
  const mW = facadeMat(facade, w/CELL, floors);
  const mD = facadeMat(facade, d/CELL, floors);
  const mk = (geo,mt,px,py,pz,ry)=>{ const m=new THREE.Mesh(geo,mt); m.position.set(px,py,pz); m.rotation.y=ry; g.add(m); };
  const pw = new THREE.PlaneGeometry(w,h), pd = new THREE.PlaneGeometry(d,h);
  mW.side=mD.side=THREE.DoubleSide;
  mk(pw,mW, 0,h/2, d/2, 0);
  mk(pw,mW, 0,h/2,-d/2, Math.PI);
  mk(pd,mD, w/2,h/2,0,  Math.PI/2);
  mk(pd,mD,-w/2,h/2,0, -Math.PI/2);
  // 屋顶
  const roofMesh = new THREE.Mesh(new THREE.BoxGeometry(w+1,1.4,d+1), mat(roofTex));
  roofMesh.position.y=h+0.4; g.add(roofMesh);
  // 底部勒脚
  const base = new THREE.Mesh(new THREE.BoxGeometry(w+0.6,2.2,d+0.6),
    new THREE.MeshLambertMaterial({color:0xb9b2a2})); base.position.y=1.1; g.add(base);
  world.add(g);
  if(collide) addCollider(x,z,w,d);
  mapShapes.push({x,z,w,d,c:mapColor});
  if(label) makeLabel(label, x, h+7, z, labelColor);
  return {x,z,w,d,h};
}

// ===================== 连廊（拱门走廊） =====================
function corridor(x1,z1,x2,z2){
  const dx=x2-x1, dz=z2-z1, len=Math.hypot(dx,dz), ang=Math.atan2(dx,dz);
  const g=new THREE.Group(); g.position.set((x1+x2)/2, 0,(z1+z2)/2); g.rotation.y=ang;
  // 二层连廊主体
  const body=new THREE.Mesh(new THREE.BoxGeometry(6, 4, len), facadeMat(brickFacade, 2, 1));
  body.position.y=FLOOR_H*2+2; g.add(body);
  // 底部柱子（形成拱门感）
  const pillarMat=new THREE.MeshLambertMaterial({color:0xd8d2c4});
  const n=Math.max(2,Math.round(len/8));
  for(let i=0;i<=n;i++){ const p=new THREE.Mesh(new THREE.BoxGeometry(1.4,FLOOR_H*2,1.4),pillarMat);
    p.position.set(0, FLOOR_H, -len/2 + i*(len/n)); g.add(p); }
  world.add(g);
}

// ===================== 圆顶报告厅 / 体育馆 =====================
function domeHall(x,z,r,name){
  const g=new THREE.Group(); g.position.set(x,0,z);
  const drumMat=new THREE.MeshLambertMaterial({color:0xcfc8b8, flatShading:true});
  const drum=new THREE.Mesh(new THREE.CylinderGeometry(r,r,16,10,1),drumMat);
  drum.position.y=8; g.add(drum);
  // 一圈窗带
  const ring=new THREE.Mesh(new THREE.CylinderGeometry(r+0.1,r+0.1,4,10,1),
    new THREE.MeshLambertMaterial({color:0x44586a, flatShading:true}));
  ring.position.y=13; g.add(ring);
  const dome=new THREE.Mesh(new THREE.SphereGeometry(r,10,5,0,Math.PI*2,0,Math.PI/2),
    new THREE.MeshLambertMaterial({color:0x7fa6c4, flatShading:true}));
  dome.position.y=16; g.add(dome);
  const top=new THREE.Mesh(new THREE.BoxGeometry(3,4,3),new THREE.MeshLambertMaterial({color:0xb9b2a2}));
  top.position.y=16+r*0.95; g.add(top);
  world.add(g);
  addCollider(x,z,r*2,r*2); mapShapes.push({x,z,w:r*2,d:r*2,c:'#8fb6d6'});
  makeLabel(name, x, 16+r+8, z, '#dff0ff');
}

// ===================== 树 / 路灯（实例化） =====================
const treePos=[], lampPos=[];
function buildTrees(){
  const trunkGeo=new THREE.BoxGeometry(1.2,5,1.2);
  const leafGeo =new THREE.BoxGeometry(5,5,5);
  const trunkMat=new THREE.MeshLambertMaterial({color:0x6b4a2b});
  const leafMat =new THREE.MeshLambertMaterial({color:0x3f8f3a});
  const trunk=new THREE.InstancedMesh(trunkGeo,trunkMat,treePos.length);
  const leaf =new THREE.InstancedMesh(leafGeo, leafMat, treePos.length*2);
  const m=new THREE.Matrix4(); let li=0;
  treePos.forEach((p,i)=>{
    m.makeTranslation(p.x,2.5,p.z); trunk.setMatrixAt(i,m);
    m.makeTranslation(p.x,6.5,p.z); leaf.setMatrixAt(li++,m);
    m.compose(new THREE.Vector3(p.x,9.5,p.z), new THREE.Quaternion(), new THREE.Vector3(0.7,0.7,0.7)); leaf.setMatrixAt(li++,m);
  });
  world.add(trunk); world.add(leaf);
}
function buildLamps(){
  const poleGeo=new THREE.BoxGeometry(0.5,7,0.5), headGeo=new THREE.BoxGeometry(1.4,1,1.4);
  const poleMat=new THREE.MeshLambertMaterial({color:0x444a52});
  const headMat=new THREE.MeshLambertMaterial({color:0xfff2c0, emissive:0xffcf66, emissiveIntensity:0.8});
  const pole=new THREE.InstancedMesh(poleGeo,poleMat,lampPos.length);
  const head=new THREE.InstancedMesh(headGeo,headMat,lampPos.length);
  const m=new THREE.Matrix4();
  lampPos.forEach((p,i)=>{ m.makeTranslation(p.x,3.5,p.z); pole.setMatrixAt(i,m);
    m.makeTranslation(p.x,7.2,p.z); head.setMatrixAt(i,m); });
  world.add(pole); world.add(head);
}

// ===================== 大门 + 旗杆 =====================
function gate(){
  const g=new THREE.Group(); g.position.set(0,0,168);
  const wMat=new THREE.MeshLambertMaterial({color:0xe6e1d4});
  // 两侧弧形连廊（用方块近似）
  for(const side of [-1,1]){
    const wing=new THREE.Mesh(new THREE.BoxGeometry(46,9,5), wMat);
    wing.position.set(side*44, 4.5, 0); g.add(wing);
    // 拱柱
    for(let i=0;i<6;i++){ const col=new THREE.Mesh(new THREE.BoxGeometry(2,9,5),wMat);
      col.position.set(side*(24+i*8), 4.5, 0); g.add(col); }
    addCollider(side*44, 168, 46, 5);
  }

function wall(x1,z1,x2,z2,gapCenter=null,gapW=0){
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz),ang=Math.atan2(dx,dz);
  const wm=new THREE.MeshLambertMaterial({color:0x9aa0a6});
  const seg=(s,e)=>{ const cx=x1+dx*((s+e)/2/len), cz=z1+dz*((s+e)/2/len), L=e-s;
    const m=new THREE.Mesh(new THREE.BoxGeometry(1,3.2,L),wm); m.position.set(cx,1.6,cz); m.rotation.y=ang; world.add(m);
    addCollider(cx,cz, Math.abs(Math.cos(ang))*1+Math.abs(Math.sin(ang))*L, Math.abs(Math.cos(ang))*L+Math.abs(Math.sin(ang))*1); };
  if(gapCenter==null){ seg(0,len); }
  else { const gc=gapCenter; seg(0,Math.max(0,gc-gapW/2)); seg(gc+gapW/2,len); }
}

// —— 自写极简鼠标锁定控制（替代 PointerLockControls addon，免模块依赖）——
const controls = (function(){
  let locked=false; const euler=new THREE.Euler(0,0,0,'YXZ');
  const evs={lock:[],unlock:[]};
  function onMove(e){ if(!locked) return;
    euler.setFromQuaternion(camera.quaternion);
    euler.y -= e.movementX*0.0022; euler.x -= e.movementY*0.0022;
    const lim=Math.PI/2-0.02; euler.x=Math.max(-lim,Math.min(lim,euler.x));
    camera.quaternion.setFromEuler(euler);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('pointerlockchange', ()=>{
    locked = (document.pointerLockElement===renderer.domElement);
    (locked?evs.lock:evs.unlock).forEach(f=>f());
  });
  const obj={ position: camera.position };
  return {
    getObject:()=>obj,
    lock:()=>{ const p=renderer.domElement.requestPointerLock(); if(p&&p.catch)p.catch(()=>{}); },
    addEventListener:(t,f)=>{ (evs[t]||[]).push(f); },
    get isLocked(){ return locked; }
  };
})();

const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
startBtn.addEventListener('click',()=>controls.lock());
controls.addEventListener('lock',()=>overlay.style.display='none');
controls.addEventListener('unlock',()=>overlay.style.display='flex');

const keys={};
let fly=false;
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyF'){ fly=!fly; vy=0; toast(fly?'✈ 飞行模式':'🚶 步行模式'); document.getElementById('modeline').textContent=fly?'✈ 飞行模式':'🚶 步行模式'; }
  const tp={Digit1:'gate',Digit2:'dome',Digit3:'dorm',Digit4:'field',Digit5:'canteen',Digit6:'dorm'};
  if(tp[e.code]&&teleports[tp[e.code]]){ const p=teleports[tp[e.code]]; const o=controls.getObject().position;
    o.set(p.x,p.y,p.z); vy=0; toast('已传送'); }
});
addEventListener('keyup',e=>keys[e.code]=false);

function collide(px,pz){
  for(const b of colliders){
    if(px>b.minx-PLAYER_R && px<b.maxx+PLAYER_R && pz>b.minz-PLAYER_R && pz<b.maxz+PLAYER_R) return true;
  }
  return false;
}

let vy=0;
const fwd=new THREE.Vector3(), right=new THREE.Vector3(), tmp=new THREE.Vector3();
function update(dt){
  const o=controls.getObject().position;
  const sprint = keys['ShiftLeft']||keys['ShiftRight'];
  let speed = (fly?42:(sprint?34:15));
  // 方向
  camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  right.crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
  let mx=0,mz=0;
  if(keys['KeyW']) mz+=1; if(keys['KeyS']) mz-=1;
  if(keys['KeyD']) mx+=1; if(keys['KeyA']) mx-=1;
  tmp.set(0,0,0);
  tmp.addScaledVector(fwd, mz).addScaledVector(right, mx);
  if(tmp.lengthSq()>0) tmp.normalize();
  const dx=tmp.x*speed*dt, dz=tmp.z*speed*dt;
  // 分轴碰撞滑动
  if(!collide(o.x+dx,o.z)) o.x+=dx;
  if(!collide(o.x,o.z+dz)) o.z+=dz;
  // 垂直
  if(fly){
    if(keys['Space']) o.y+=speed*dt;
    if(keys['ControlLeft']||keys['ControlRight']) o.y-=speed*dt;
    o.y=Math.max(EYE,o.y);
  } else {
    if(keys['Space'] && Math.abs(o.y-EYE)<0.05) vy=9.5;
    vy-=26*dt; o.y+=vy*dt;
    if(o.y<EYE){ o.y=EYE; vy=0; }
  }
  // 限制在校园外圈内
  o.x=Math.max(-185,Math.min(185,o.x)); o.z=Math.max(-160,Math.min(186,o.z));
}

// ===================== 小地图 =====================
const mm=document.getElementById('minimap'), mg=mm.getContext('2d');
const MM=190, MAP_MIN=-190, MAP_MAX=190, MAP_SPAN=MAP_MAX-MAP_MIN;
function w2m(v){ return (v-MAP_MIN)/MAP_SPAN*MM; }
function drawMinimap(){
  mg.clearRect(0,0,MM,MM);
  mg.fillStyle='#3d6b34'; mg.fillRect(0,0,MM,MM);
  for(const s of mapShapes){ mg.fillStyle=s.c;
    mg.fillRect(w2m(s.x-s.w/2), w2m(s.z-s.d/2), Math.max(2,s.w/MAP_SPAN*MM), Math.max(2,s.d/MAP_SPAN*MM)); }
  // 玩家
  const o=controls.getObject().position;
  const px=w2m(o.x), pz=w2m(o.z);
  camera.getWorldDirection(fwd);
  mg.strokeStyle='#fff'; mg.lineWidth=2; mg.beginPath(); mg.moveTo(px,pz);
  mg.lineTo(px+fwd.x*12, pz+fwd.z*12); mg.stroke();
  mg.fillStyle='#ff3b3b'; mg.beginPath(); mg.arc(px,pz,3.5,0,Math.PI*2); mg.fill();
}

// ===================== Toast / HUD =====================
const toastEl=document.getElementById('toast'); let toastT;
function toast(t){ toastEl.textContent=t; toastEl.style.opacity=1; clearTimeout(toastT);
  toastT=setTimeout(()=>toastEl.style.opacity=0,1200); }
const locEl=document.getElementById('loc'), fpsEl=document.getElementById('fps');
let fpsAcc=0,fpsFrames=0,fpsTime=0;

// ===================== 主循环 =====================
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(0.05, clock.getDelta());
  if(controls.isLocked) update(dt);
  clouds.position.x = (clock.elapsedTime*2)%200 - 100;
  // HUD
  const o=controls.getObject().position;
  locEl.textContent=`x ${o.x.toFixed(0)}  z ${o.z.toFixed(0)}  y ${o.y.toFixed(0)}`;
  drawMinimap();
  fpsFrames++; fpsTime+=dt; if(fpsTime>0.5){ fpsEl.textContent='FPS '+Math.round(fpsFrames/fpsTime); fpsFrames=0; fpsTime=0; }
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); });

// ===================== 调试钩子 =====================
window.__mc = { scene, camera, controls, colliders, mapShapes, teleports,

if(TEST){ console.log('[test] mc ready. teleports:', Object.keys(teleports), 'colliders:', colliders.length); }
})();
