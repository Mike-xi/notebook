<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板</title>
  <style>
    :root {
      --bg:#f3f4f6; --fg:#1c1b1f; --muted:#6b7280; --card:#ffffff; --border:#e3e6eb;
      --accent:#6750A4; --chip:#eef0f4; --danger:#dc2626;
    }
    body.dark {
      --bg:#0f1115; --fg:#e6e1e5; --muted:#9aa0a6; --card:#1a1d23; --border:#2a2e36;
      --accent:#D0BCFF; --chip:#23262e; --danger:#f87171;
    }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; }
    html, body { margin:0; height:100%; }
    body {
      background:var(--bg); color:var(--fg); display:flex; flex-direction:column; height:100vh;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    header {
      flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:11px 14px;
      background:var(--card); border-bottom:1px solid var(--border);
    }
    header .back { text-decoration:none; color:var(--fg); font-size:20px; line-height:1; padding:4px 6px; border-radius:8px; }
    header .back:hover { background:var(--chip); }
    header .title { font-weight:700; font-size:16px; flex:1 1 auto; }
    header .title small { font-weight:500; color:var(--muted); font-size:12px; margin-left:6px; }
    .admin-flag { font-size:11.5px; color:var(--accent); border:1px solid var(--accent); border-radius:999px; padding:2px 9px; }

    #list { flex:1 1 auto; overflow-y:auto; padding:14px 14px 6px; display:flex; flex-direction:column; gap:10px; }
    .empty { color:var(--muted); text-align:center; margin-top:40px; font-size:14px; }
    .post {
      background:var(--card); border:1px solid var(--border); border-radius:14px; padding:11px 14px;
    }
    .post .head { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
    .post .nick { font-weight:600; font-size:14px; }
    .post .time { font-size:11.5px; color:var(--muted); }
    .post .body { font-size:14.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
    .post .meta {
      margin-top:8px; padding-top:7px; border-top:1px dashed var(--border);
      font-size:11.5px; color:var(--muted); font-family:ui-monospace, "SFMono-Regular", Consolas, monospace;
      display:flex; flex-wrap:wrap; gap:4px 14px; align-items:center;
    }
    .post .meta .k { color:var(--accent); }
    .post .del {
      margin-left:auto; border:1px solid var(--border); background:none; color:var(--danger);
      border-radius:8px; padding:2px 10px; font-size:11.5px; cursor:pointer; font-family:inherit;
    }
    .post .del:hover { border-color:var(--danger); }

    footer { flex:0 0 auto; background:var(--card); border-top:1px solid var(--border); padding:10px 12px; }
    .row1 { display:flex; gap:8px; margin-bottom:8px; }
    #nick { flex:0 0 38%; max-width:200px; border:1px solid var(--border); border-radius:10px; padding:9px 11px; font-size:14px; background:var(--bg); color:var(--fg); }
    .row2 { display:flex; gap:8px; }
    #body { flex:1 1 auto; resize:none; border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:15px;
      background:var(--bg); color:var(--fg); max-height:140px; min-height:44px; line-height:1.4; font-family:inherit; }
    #nick:focus, #body:focus { outline:none; border-color:var(--accent); }
    #send { flex:0 0 auto; border:none; border-radius:12px; padding:0 20px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
    #send:disabled { opacity:.5; cursor:default; }
    .hint { font-size:11.5px; color:var(--muted); margin-top:6px; }
    .toast { position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:#111; color:#fff; padding:8px 16px; border-radius:999px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:20; }
    .toast.show { opacity:.92; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/" title="返回">‹</a>
    <div class="title">留言板 <small>人人可发 · 人人可见</small></div>
    <span class="admin-flag" id="admin-flag" hidden>管理员视图</span>
  </header>

  <div id="list"><div class="empty" id="empty" hidden>还没有留言，来抢个沙发～</div></div>

  <footer>
    <div class="row1">
      <input id="nick" maxlength="24" placeholder="昵称（可改）">
    </div>
    <div class="row2">
      <textarea id="body" rows="1" placeholder="说点什么…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="send">发送</button>
    </div>
    <div class="hint" id="hint">所有留言对全体登录用户可见。</div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="/assets/board.js?v=20260617c"></script>
</body>
</html>
