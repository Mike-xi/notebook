<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>笔记分享</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=20260607c">
  <link rel="stylesheet" href="/assets/style.css?v=20260610a">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <link id="hljs-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" disabled>
  <style>
    :root { --md-border: var(--outline-variant); --md-code-bg: var(--surface-container); --md-muted: var(--on-surface-variant); --md-link:#0969da; }
    :root[data-theme="dark"] { --md-link:#79b8ff; }
    body.share { min-height: 100vh; display: flex; flex-direction: column; background: var(--surface); margin: 0; }

    .share-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--outline-variant);
      background: var(--surface-container-low);
      flex: none;
    }
    .share-brand { font-size: 14px; font-weight: 600; flex: none; }
    .share-ro {
      flex: none;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--primary-container);
      color: var(--on-primary-container);
    }
    .share-title {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      color: var(--on-surface-variant);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    #share-status { padding: 64px 20px; text-align: center; font-size: 14px; color: var(--on-surface-variant); }
    #share-status.err { color: var(--error); }

    /* Markdown 正文 */
    #share-md { max-width: 820px; margin: 0 auto; padding: 40px 28px 120px; font-size: 16px; line-height: 1.7; color: var(--on-surface); word-wrap: break-word; width: 100%; box-sizing: border-box; }
    #share-md h1, #share-md h2, #share-md h3, #share-md h4 { font-weight: 600; line-height: 1.3; margin: 1.6em 0 .6em; }
    #share-md h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid var(--md-border); }
    #share-md h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--md-border); }
    #share-md h3 { font-size: 1.25em; }
    #share-md p { margin: .8em 0; }
    #share-md a { color: var(--md-link); text-decoration: none; }
    #share-md ul, #share-md ol { padding-left: 1.6em; margin: .6em 0; }
    #share-md code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .88em; background: var(--md-code-bg); padding: .2em .4em; border-radius: 6px; }
    #share-md pre { margin: 1em 0; border-radius: 10px; overflow: auto; border: 1px solid var(--md-border); }
    #share-md pre code, #share-md pre.hljs { display: block; padding: 14px 16px; background: var(--md-code-bg); font-size: .86em; line-height: 1.5; border-radius: 10px; }
    #share-md pre code { padding: 0; background: transparent; border: none; }
    #share-md blockquote { margin: 1em 0; padding: .4em 1em; color: var(--md-muted); border-left: 4px solid var(--md-border); border-radius: 0 8px 8px 0; }
    #share-md table { border-collapse: collapse; margin: 1em 0; display: block; overflow: auto; }
    #share-md th, #share-md td { border: 1px solid var(--md-border); padding: 7px 13px; }
    #share-md th { background: var(--md-code-bg); font-weight: 600; }
    #share-md img { max-width: 100%; }

    /* html / pdf 用 iframe 撑满剩余空间 */
    #share-frame { flex: 1; width: 100%; border: none; background: var(--surface); }
  </style>
</head>
<body class="share">
  <header class="share-bar">
    <span class="share-brand">📓 复习笔记</span>
    <span class="share-ro">只读分享</span>
    <span class="share-title" id="share-title"></span>
  </header>

  <div id="share-status">正在打开分享…</div>
  <article id="share-md" hidden></article>
  <iframe id="share-frame" hidden title="分享的笔记"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>
    (function () {
      const statusEl = document.getElementById('share-status');
      const mdEl = document.getElementById('share-md');
      const frameEl = document.getElementById('share-frame');
      const titleEl = document.getElementById('share-title');
      const token = new URLSearchParams(location.search).get('token') || '';

      function fail(msg) { statusEl.textContent = '⚠️ ' + msg; statusEl.classList.add('err'); }
      if (!token) { fail('缺少分享凭证'); return; }

      // hljs 主题随系统
      (function () {
        const dark = document.documentElement.dataset.theme === 'dark';
        const lin = document.getElementById('hljs-light');
        const din = document.getElementById('hljs-dark');
        if (lin) lin.disabled = dark;
        if (din) din.disabled = !dark;
      })();

      fetch('/api/shared?token=' + encodeURIComponent(token))
        .then(async (r) => {
          const d = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(d.error || '加载失败');
          return d;
        })
        .then((d) => {
          document.title = (d.title || '笔记') + ' · 分享';
          titleEl.textContent = (d.subject ? d.subject + ' · ' : '') + (d.title || '');
          if (d.kind === 'md') return renderMd(d.content || '');
          if (d.kind === 'pdf') {
            statusEl.hidden = true;
            frameEl.hidden = false;
            frameEl.src = '/api/shared?token=' + encodeURIComponent(token) + '&raw=1';
            return;
          }
          // html：sandbox 渲染（允许脚本但不给同源权限，拿不到站点 cookie/存储）
          statusEl.hidden = true;
          frameEl.hidden = false;
          frameEl.setAttribute('sandbox', 'allow-scripts');
          frameEl.srcdoc = d.content || '';
        })
        .catch((e) => fail(e.message || '加载失败'));

      function renderMd(text) {
        if (!window.markdownit) { fail('渲染组件加载失败'); return; }
        const md = window.markdownit({
          html: false, linkify: true, breaks: false,
          highlight(str, lang) {
            if (window.hljs && lang && window.hljs.getLanguage(lang)) {
              try {
                return '<pre class="hljs"><code>' + window.hljs.highlight(str, { language: lang, ignoreIllegals: true }).value + '</code></pre>';
              } catch {}
            }
            return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
          },
        });
        if (window.texmath && window.katex) {
          try {
            md.use(window.texmath, { engine: window.katex, delimiters: 'dollars', katexOptions: { throwOnError: false } });
          } catch {}
        }
        statusEl.hidden = true;
        mdEl.hidden = false;
        mdEl.innerHTML = md.render(text);
      }
    })();
  </script>
</body>
</html>
