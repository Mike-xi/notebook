<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Opening share…</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/png" href="/assets/favicon-xi.png?v=20260613b">
  <style>
    html,body{height:100%;margin:0;}
    body{display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,"PingFang SC",sans-serif;
      background:#f7f6fb;color:#444;}
    :root[data-theme="dark"] body{background:#111418;color:#c8c8d0;}
    .msg{font-size:14px;text-align:center;padding:24px;}
  </style>
</head>
<body>
  <!-- 旧分享链接（/share.html?token=…）入口：拿到 kind 后重定向到带 token 的完整阅读器。 -->
  <div class="msg" id="msg">Opening share…</div>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      var token = new URLSearchParams(location.search).get('token') || '';
      if (!token) { msg.textContent = '⚠️ Missing share token'; return; }
      fetch('/api/shared?token=' + encodeURIComponent(token))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d) { msg.textContent = '⚠️ This share link is invalid or has expired'; return; }
          var k = (d.kind === 'pdf' || d.kind === 'md') ? d.kind : 'html';
          location.replace('/reader.html?share=' + encodeURIComponent(token) + '&k=' + k);
        })
        .catch(function () { msg.textContent = '⚠️ Failed to open, please try again later'; });
    })();
  </script>
</body>
</html>
