<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 阅读</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <link id="hljs-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" disabled>
  <style>
    :root {
      --md-bg:#fff; --md-fg:#24292f; --md-muted:#57606a; --md-border:#d0d7de;
      --md-code-bg:#f6f8fa; --md-quote:#57606a; --md-accent:#6750A4; --md-link:#0969da;
    }
    body.dark {
      --md-bg:#15171c; --md-fg:#d7d3da; --md-muted:#9aa0a6; --md-border:#2c2f36;
      --md-code-bg:#1d2026; --md-quote:#9aa0a6; --md-accent:#D0BCFF; --md-link:#79b8ff;
    }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; }
    html, body { margin:0; padding:0; }
    body {
      background:var(--md-bg); color:var(--md-fg);
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height:1.7; transition:background-color .2s ease, color .2s ease;
    }
    #md-wrap { max-width:820px; margin:0 auto; padding:56px 28px 120px; }
    #md-content { font-size:16px; word-wrap:break-word; }

    #md-content h1, #md-content h2, #md-content h3,
    #md-content h4, #md-content h5, #md-content h6 { font-weight:600; line-height:1.3; margin:1.6em 0 .6em; scroll-margin-top:24px; }
    #md-content h1 { font-size:1.9em; padding-bottom:.3em; border-bottom:1px solid var(--md-border); }
    #md-content h2 { font-size:1.5em; padding-bottom:.3em; border-bottom:1px solid var(--md-border); }
    #md-content h3 { font-size:1.25em; }
    #md-content h4 { font-size:1.05em; }
    #md-content p { margin:.8em 0; }
    #md-content a { color:var(--md-link); text-decoration:none; }
    #md-content a:hover { text-decoration:underline; }
    #md-content ul, #md-content ol { padding-left:1.6em; margin:.6em 0; }
    #md-content li { margin:.25em 0; }
    #md-content code {
      font-family:"SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size:.88em; background:var(--md-code-bg); padding:.2em .4em; border-radius:6px;
    }
    #md-content pre { margin:1em 0; border-radius:10px; overflow:auto; border:1px solid var(--md-border); }
    #md-content pre code, #md-content pre.hljs { display:block; padding:14px 16px; background:var(--md-code-bg); font-size:.86em; line-height:1.5; border-radius:10px; }
    #md-content pre code { padding:0; background:transparent; border:none; }
    #md-content blockquote {
      margin:1em 0; padding:.4em 1em; color:var(--md-quote);
      border-left:4px solid var(--md-border); background:color-mix(in srgb, var(--md-fg) 4%, transparent);
      border-radius:0 8px 8px 0;
    }
    #md-content table { border-collapse:collapse; margin:1em 0; display:block; overflow:auto; }
    #md-content th, #md-content td { border:1px solid var(--md-border); padding:7px 13px; }
    #md-content th { background:var(--md-code-bg); font-weight:600; }
    #md-content img { max-width:100%; }
    #md-content hr { border:none; border-top:1px solid var(--md-border); margin:1.6em 0; }
    #md-content .katex-display { overflow-x:auto; overflow-y:hidden; padding:4px 0; }

    #md-loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; gap:10px; color:var(--md-muted); font-size:14px; }
    .md-spin { width:18px; height:18px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:mdspin .8s linear infinite; }
    @keyframes mdspin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="md-wrap"><article id="md-content"></article></div>
  <div id="md-loading"><span class="md-spin"></span><span>渲染 Markdown…</span></div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/texmath.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="/assets/md-viewer.js?v=20260610a"></script>
</body>
</html>
