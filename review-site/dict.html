<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英汉词典 · Xi Notebook</title>
  <link rel="icon" href="/assets/favicon-xi.png">
  <!-- 首屏防闪烁：在样式应用前先按偏好定 data-theme（与全站一致） -->
  <script>
    (function () {
      try {
        var p = localStorage.getItem('nb-theme') || 'auto';
        var dark = p === 'dark' || (p === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/assets/style.css?v=20260619c">
  <style>
    /* ===== 词典页专属布局（复用全站 M3 令牌，保证设计一致） ===== */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden;
           background: var(--surface-container-low); }

    .dict-header {
      flex: 0 0 auto; width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; background: var(--surface-container-lowest);
      border-bottom: 1px solid var(--outline-variant);
    }
    .dict-header .title { font-size: 17px; font-weight: 600; flex: 1 1 auto; letter-spacing: -0.01em; }
    .dict-header .title small { font-weight: 400; color: var(--on-surface-variant); font-size: 12.5px; margin-left: 8px; }

    .dict-search { flex: 0 0 auto; width: 100%; background: var(--surface-container-lowest);
      border-bottom: 1px solid var(--outline-variant); padding: 16px 20px; position: relative; z-index: 30; }
    .search-box { display: flex; gap: 10px; align-items: center; max-width: 820px; margin: 0 auto; position: relative; }
    .search-field { flex: 1 1 auto; position: relative; display: flex; align-items: center; }
    #q { width: 100%; border: 1.5px solid var(--outline-variant); border-radius: var(--radius-full);
      padding: 12px 44px 12px 18px; font-size: 16px; background: var(--surface); color: var(--on-surface);
      font-family: inherit; transition: border-color var(--transition); }
    #q:focus { outline: none; border-color: var(--primary); }
    .clear-q { position: absolute; right: 8px; width: 30px; height: 30px; border-radius: var(--radius-full);
      border: none; background: transparent; color: var(--on-surface-variant); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; }
    .clear-q:hover { background: var(--surface-container-high); }
    #go { flex: 0 0 auto; height: 47px; padding: 0 20px; font-size: 15px; }
    #go .ic { margin-right: -2px; }

    .suggest { position: absolute; left: 0; right: 0; top: calc(100% + 8px); background: var(--surface-container-lowest);
      border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      max-height: min(56vh, 420px); overflow-y: auto; padding: 6px; }
    .s-item { display: flex; gap: 12px; align-items: baseline; padding: 9px 14px; border-radius: var(--radius-md); cursor: pointer; }
    .s-item:hover, .s-item.active { background: var(--surface-container-high); }
    .s-w { font-weight: 600; font-size: 15px; flex: 0 0 auto; }
    .s-t { color: var(--on-surface-variant); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 选项卡：干净的下划线式，无外框/无实心胶囊 */
    .dtabs { flex: 0 0 auto; display: flex; gap: 26px; padding: 14px 20px 0; max-width: 820px; margin: 0 auto; width: 100%; }
    .dtabs .tab { border-radius: 0; background: transparent; padding: 4px 2px 10px; color: var(--on-surface-variant);
      border-bottom: 2px solid transparent; transition: color var(--transition), border-color var(--transition); }
    .dtabs .tab:hover { background: transparent; color: var(--on-surface); }
    .dtabs .tab.active { background: transparent; color: var(--on-surface); border-bottom-color: var(--primary); }
    .dtabs .tab .cnt { font-size: 11px; opacity: .7; margin-left: 4px; }

    main { flex: 1 1 auto; overflow-y: auto; max-width: none; margin: 0; padding: 0; }
    .panel { max-width: 820px; margin: 0 auto; padding: 20px; }

    .placeholder { color: var(--on-surface-variant); text-align: center; margin-top: 52px; font-size: 15px; line-height: 1.9; }
    .placeholder .big { color: var(--primary); margin-bottom: 6px; }
    .placeholder b { color: var(--on-surface); }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .qc { background: var(--surface-container-high); border: 1px solid var(--outline-variant); border-radius: var(--radius-full);
      padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--on-surface); transition: background-color var(--transition); }
    .qc:hover { background: var(--surface-container-highest); }

    .entry { background: var(--surface-container-lowest); border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 22px 22px 18px; margin-bottom: 16px; }
    .hw { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .word { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; color: var(--on-surface); }
    .fav-btn { border: none; background: transparent; cursor: pointer; color: var(--outline);
      display: inline-flex; align-items: center; padding: 4px; border-radius: var(--radius-full); transition: background-color var(--transition); }
    .fav-btn:hover { background: var(--surface-container-high); }
    .fav-btn.on { color: #e0a106; }
    [data-theme="dark"] .fav-btn.on { color: #f0c64a; }

    .phon { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0 2px; color: var(--on-surface-variant); }
    .ipa { font-family: "Times New Roman", "Cambria Math", serif; font-size: 16px; }
    .spk { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--outline-variant); background: var(--surface);
      border-radius: var(--radius-full); padding: 4px 12px; font-size: 12.5px; cursor: pointer; color: var(--on-surface);
      transition: background-color var(--transition), border-color var(--transition); }
    .spk:hover { background: var(--surface-container-high); border-color: var(--primary); }

    .badges { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0; align-items: center; }
    .stars { display: inline-flex; align-items: center; gap: 1px; color: #e0a106; }
    [data-theme="dark"] .stars { color: #f0c64a; }
    .stars .empty { display: inline-flex; color: var(--outline-variant); }
    .badge { font-size: 11.5px; border-radius: var(--radius-full); padding: 3px 11px; border: 1px solid var(--outline-variant); color: var(--on-surface-variant); }
    .badge.exam { color: var(--primary); border-color: color-mix(in srgb, var(--primary) 45%, transparent); }
    .badge.oxf { color: #0a8f4f; border-color: color-mix(in srgb, #0a8f4f 45%, transparent); }
    [data-theme="dark"] .badge.oxf { color: #34d399; border-color: color-mix(in srgb, #34d399 45%, transparent); }

    .sense { margin-top: 14px; }
    .sense h4 { font-size: 11.5px; color: var(--on-surface-variant); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; margin: 0 0 6px; }
    .trans { font-size: 16px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; color: var(--on-surface); }
    .endef { font-size: 14px; line-height: 1.7; white-space: pre-wrap; color: var(--on-surface-variant); }
    .forms { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .form { background: var(--surface-container-high); border-radius: var(--radius-md); padding: 5px 11px; font-size: 12.5px; color: var(--on-surface); }
    .form b { font-weight: 500; color: var(--on-surface-variant); margin-right: 5px; }
    .form a { color: var(--primary); cursor: pointer; }
    .multi-note { font-size: 12px; color: var(--on-surface-variant); margin-top: 16px; font-weight: 600; }

    .ai-bar { margin-top: 18px; }
    .ai-panel { margin-top: 14px; border: 1px solid var(--outline-variant); border-radius: var(--radius-lg);
      padding: 4px 18px 14px; background: var(--surface-container-low); }
    .ai-panel h2 { font-size: 14px; color: var(--primary); margin: 16px 0 6px; font-weight: 600; }
    .ai-panel p { font-size: 14px; line-height: 1.75; margin: 6px 0; color: var(--on-surface); }
    .ai-panel li { font-size: 14px; line-height: 1.75; color: var(--on-surface); }
    .ai-panel code { background: var(--surface-container-high); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
    .ai-panel .muted { color: var(--on-surface-variant); }
    .ai-panel .err { color: var(--error); }
    .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--outline-variant);
      border-top-color: var(--primary); border-radius: 50%; animation: dspin .7s linear infinite; vertical-align: -2px; }
    @keyframes dspin { to { transform: rotate(360deg); } }

    .list-head { display: flex; align-items: center; margin-bottom: 12px; }
    .list-head .t { font-weight: 600; font-size: 14px; flex: 1 1 auto; color: var(--on-surface-variant); }
    .litem { display: flex; align-items: center; gap: 12px; background: var(--surface-container-lowest);
      border: 1px solid var(--outline-variant); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 9px; cursor: pointer;
      transition: border-color var(--transition); }
    .litem:hover { border-color: var(--primary); }
    .lw { font-weight: 600; font-size: 15.5px; color: var(--on-surface); }
    .lp { color: var(--on-surface-variant); font-size: 12.5px; font-family: serif; }
    .lt { color: var(--on-surface-variant); font-size: 13px; flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ltime { color: var(--on-surface-variant); font-size: 11.5px; flex: 0 0 auto; }
    .litem .rm { border: none; background: transparent; color: var(--on-surface-variant); cursor: pointer; padding: 4px;
      flex: 0 0 auto; border-radius: var(--radius-full); display: inline-flex; }
    .litem .rm:hover { color: var(--error); background: var(--surface-container-high); }
    .list-empty { color: var(--on-surface-variant); text-align: center; margin-top: 44px; font-size: 14px; }

    .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); background: var(--on-surface);
      color: var(--surface); padding: 10px 18px; border-radius: var(--radius-full); font-size: 13.5px; box-shadow: var(--shadow-lg);
      opacity: 0; transition: opacity var(--transition); pointer-events: none; z-index: 50; }
    .toast.show { opacity: 1; }

    @media (max-width: 560px) {
      .dict-header, .dict-search { padding-left: 14px; padding-right: 14px; }
      .panel { padding: 16px 14px 40px; }
      .word { font-size: 26px; }
      #q { font-size: 15px; }
      #go .pill-label { display: none; }
      #go { padding: 0 14px; }
    }
  </style>
</head>
<body>
  <header class="dict-header">
    <a class="icon-btn" href="/" title="返回" aria-label="返回"><span class="ic" data-icon="back"></span></a>
    <div class="title">英汉词典 <small id="sub">收录全量词汇 · 牛津/柯林斯星级</small></div>
  </header>

  <div class="dict-search">
    <div class="search-box">
      <div class="search-field">
        <input id="q" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="输入英文单词，如 comprehensive">
        <button class="clear-q" id="clearq" hidden title="清空"><span class="ic" data-icon="close" data-icon-size="18"></span></button>
      </div>
      <button id="go" class="pill-btn pill-primary"><span class="ic" data-icon="search" data-icon-size="18"></span><span class="pill-label">查词</span></button>
      <div class="suggest" id="suggest" hidden></div>
    </div>
  </div>

  <div class="dtabs">
    <button class="tab active" data-tab="result">释义</button>
    <button class="tab" data-tab="history">历史<span class="cnt" id="hcnt"></span></button>
    <button class="tab" data-tab="wordbook">单词本<span class="cnt" id="fcnt"></span></button>
  </div>

  <main>
    <div class="panel" id="panel-result">
      <div class="placeholder" id="welcome">
        <div class="big"><span class="ic" data-icon="bookopen" data-icon-size="42"></span></div>
        输入一个英文单词开始查询<br>
        点 <b>★</b> 收藏到单词本，查词记录自动云端同步
        <div class="quick-chips" id="quick"></div>
      </div>
      <div id="result"></div>
    </div>

    <div class="panel" id="panel-history" hidden>
      <div class="list-head">
        <div class="t">查词历史（最近 200 条 · 云端同步）</div>
        <button class="pill-btn" id="clrhist"><span class="ic" data-icon="trash" data-icon-size="16"></span><span class="pill-label">清空</span></button>
      </div>
      <div id="histlist"></div>
      <div class="list-empty" id="histempty" hidden>还没有查词记录</div>
    </div>

    <div class="panel" id="panel-wordbook" hidden>
      <div class="list-head">
        <div class="t">我的单词本（云端同步）</div>
      </div>
      <div id="favlist"></div>
      <div class="list-empty" id="favempty" hidden>单词本还是空的，查词后点 ★ 收藏吧</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/assets/icons.js?v=20260619c"></script>
  <script src="/assets/theme.js?v=20260719c"></script>
  <script src="/assets/dict.js?v=20260619c"></script>
</body>
</html>
