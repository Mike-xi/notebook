<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Microsoft YaHei','PingFang SC',sans-serif">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2a44"/><stop offset="1" stop-color="#071c30"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071c30"/><stop offset="1" stop-color="#04101c"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="880" height="400" fill="#081826"/>

  <!-- 等轴测水面（上）与水下（下） -->
  <polygon points="60,120 820,120 880,200 20,200" fill="url(#water)" opacity=".9"/>
  <polygon points="20,200 880,200 880,340 20,340" fill="url(#deep)"/>
  <line x1="20" y1="200" x2="880" y2="200" stroke="#56b8e6" stroke-opacity=".5" stroke-width="1.2"/>
  <text x="26" y="193" font-size="10" fill="#5f7f9c" letter-spacing="2">水面 SURFACE</text>
  <text x="26" y="330" font-size="10" fill="#3d566e" letter-spacing="2">水下 SUBMERGED</text>
  <!-- 水面网格 -->
  <g stroke="#56b8e6" stroke-opacity=".08">
    <line x1="140" y1="120" x2="105" y2="200"/><line x1="260" y1="120" x2="230" y2="200"/>
    <line x1="380" y1="120" x2="355" y2="200"/><line x1="500" y1="120" x2="480" y2="200"/>
    <line x1="620" y1="120" x2="605" y2="200"/><line x1="740" y1="120" x2="730" y2="200"/>
    <line x1="48" y1="150" x2="843" y2="150"/><line x1="35" y1="172" x2="862" y2="172"/>
  </g>

  <!-- 计划航线（虚线）与航点 -->
  <path id="route" d="M56,214 L300,214 C330,214 336,252 366,252 L446,252 C476,252 482,214 512,214 L560,214 C592,214 596,178 636,178 L700,178 C736,178 742,214 772,214 L844,214"
        fill="none" stroke="#8fb0cc" stroke-opacity=".45" stroke-width="1.4" stroke-dasharray="5 6"/>
  <g fill="none" stroke="#56b8e6" stroke-width="1.4">
    <path d="M56,208 l6,6 -6,6 -6,-6 z" fill="#0a1e30"/>
    <path d="M844,208 l6,6 -6,6 -6,-6 z" fill="#0a1e30"/>
  </g>

  <!-- 障碍一：漂浮木（占水面浅层） -->
  <g>
    <rect x="378" y="204" width="66" height="14" rx="7" fill="#e8b64c" opacity=".92"/>
    <rect x="378" y="211" width="66" height="7" rx="3.5" fill="#a87f2e" opacity=".8"/>
    <text x="411" y="196" font-size="11" fill="#e8b64c" text-anchor="middle">漂浮障碍 · 吃水浅</text>
  </g>

  <!-- 障碍二：全水深立柱 -->
  <g>
    <rect x="654" y="130" width="26" height="196" rx="4" fill="#7e3040"/>
    <rect x="654" y="130" width="26" height="196" rx="4" fill="none" stroke="#e05c5c" stroke-opacity=".8"/>
    <ellipse cx="667" cy="130" rx="13" ry="5" fill="#e05c5c" opacity=".85"/>
    <text x="667" y="118" font-size="11" fill="#e05c5c" text-anchor="middle">全水深障碍</text>
  </g>

  <!-- 半潜艇（沿航线运动；前方感知扇形） -->
  <g>
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      values="0;1;1;0;0" keyTimes="0;.03;.94;.985;1"/>
    <animateMotion dur="12s" repeatCount="indefinite" rotate="auto">
      <mpath href="#route"/>
    </animateMotion>
    <!-- 感知扇形 -->
    <path d="M14,0 L74,-24 A66,66 0 0 1 74,24 Z" fill="#56b8e6" opacity=".14">
      <animate attributeName="fill" dur="12s" repeatCount="indefinite"
        values="#56b8e6;#56b8e6;#e8b64c;#e8b64c;#56b8e6;#56b8e6;#e8b64c;#e8b64c;#56b8e6;#56b8e6"
        keyTimes="0;.14;.16;.30;.34;.50;.52;.66;.70;1"/>
      <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values=".10;.22;.10"/>
    </path>
    <!-- 艇体 -->
    <g>
      <rect x="-22" y="-8" width="44" height="16" rx="8" fill="#56b8e6"/>
      <rect x="-22" y="-8" width="44" height="16" rx="8" fill="none" stroke="#dceaf5" stroke-opacity=".5"/>
      <rect x="-2" y="-13" width="10" height="6" rx="2" fill="#dceaf5" opacity=".85"/>
      <rect x="-28" y="-5" width="8" height="10" rx="2" fill="#2c6fd6"/>
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
        values="1;1;.7;.7;1;1" keyTimes="0;.20;.24;.40;.44;1"/>
    </g>
  </g>

  <!-- 事件标签 -->
  <g font-size="12">
    <g opacity="0">
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
        values="0;0;1;1;0;0" keyTimes="0;.16;.19;.42;.46;1"/>
      <rect x="322" y="272" width="170" height="24" rx="6" fill="#0a1e30" stroke="#e8b64c" stroke-opacity=".5"/>
      <text x="407" y="288" fill="#e8b64c" text-anchor="middle">判定：漂浮物 → 下潜穿越</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
        values="0;0;1;1;0;0" keyTimes="0;.54;.57;.82;.86;1"/>
      <rect x="586" y="272" width="170" height="24" rx="6" fill="#0a1e30" stroke="#e05c5c" stroke-opacity=".5"/>
      <text x="671" y="288" fill="#e05c5c" text-anchor="middle">判定：全水深 → 绕行规避</text>
    </g>
  </g>

  <!-- 图例 -->
  <g font-size="11" fill="#8fb0cc">
    <circle cx="330" cy="374" r="4" fill="#56b8e6"/><text x="340" y="378">感知 · 单目+IMU+深度计</text>
    <circle cx="500" cy="374" r="4" fill="#e8b64c"/><text x="510" y="378">决策 · ILOS 制导+双通道规避</text>
    <circle cx="690" cy="374" r="4" fill="#3fbf8f"/><text x="700" y="378">控制 · 航向环+浮潜协同</text>
  </g>
</svg>
