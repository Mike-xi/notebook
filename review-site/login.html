<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Xi Notebook</title>
  <script>
    (function(){try{var p=localStorage.getItem('nb-theme')||'auto';var d=p==='dark'||(p==='auto'&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=d?'dark':'light';}catch(e){}})();
  </script>
  <link rel="icon" type="image/png" href="/assets/favicon-xi.png?v=20260613b">
  <link rel="stylesheet" href="/assets/style.css?v=20260613b">
</head>
<body class="login">
  <main class="login-card">
    <img class="login-logo" src="/assets/brand-xinotebook.png?v=20260613b" alt="Xi Notebook">
    <span class="eyebrow">Welcome back</span>
    <form id="login-form">
      <label for="password">Access password</label>
      <input type="password" id="password" autocomplete="current-password" required autofocus>
      <button type="submit" id="submit-btn">Enter →</button>
      <p id="error" class="error-msg" hidden>Wrong password</p>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const err = document.getElementById('error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Checking…';

      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          location.href = '/';
          return;
        }
        err.textContent = 'Wrong password';
        err.hidden = false;
      } catch {
        err.textContent = 'Network error, please retry';
        err.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enter →';
      }
    });
  </script>
</body>
</html>
