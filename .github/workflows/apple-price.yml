name: 苹果比价每日刷新

# GitHub Runner 直接读取 Apple 中国官网，避开 Apple 对 Cloudflare 出口的 403；站点端同时刷新第三方参考价。
# 需要在仓库 Settings → Secrets and variables → Actions 配置 APPLE_REFRESH_KEY，且与 Pages 环境变量一致。
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apple-price.yml'
      - 'scripts/apple-official-refresh.mjs'
      - 'review-site/functions/api/apple/refresh.js'
  schedule:
    - cron: '0 1 * * *'      # 每天 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出价格采集器
        uses: actions/checkout@v4

      - name: 使用 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 采集官网并刷新站点
        env:
          APPLE_REFRESH_KEY: ${{ secrets.APPLE_REFRESH_KEY }}
          APPLE_REFRESH_ENDPOINT: https://sjtu.ccwu.cc/api/apple/refresh
        run: node scripts/apple-official-refresh.mjs
